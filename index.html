<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>AZNET Scheduler</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #131823;
    --panel-2: #1a2030;
    --border: #232a3d;
    --text: #e6edf3;
    --muted: #8b94a8;
    --accent: #4cc2ff;
    --accent-2: #a371f7;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --pink: #ff7b72;
    --ms-blue: #2f6fdb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
  }
  header {
    background: var(--panel);
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  nav { display: flex; gap: 8px; margin-left: auto; }
  nav button {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px;
  }
  nav button.active { background: var(--accent); color: #000; border-color: var(--accent); }
  nav button:hover:not(.active) { border-color: var(--accent); }
  main { padding: 24px; max-width: 1400px; margin: 0 auto; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .panel h2 { margin-top: 0; font-size: 15px; color: var(--accent); }
  .panel h3 { font-size: 14px; color: var(--accent-2); margin-top: 24px; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  input, select, textarea {
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px; border-radius: 4px; font-size: 13px;
    font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent); border: 0; color: #000;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: transparent; color: var(--text); border: 1px solid var(--border);
  }
  button.danger { background: var(--red); color: white; }
  button.small { padding: 3px 8px; font-size: 11px; }
  button.ms-signin {
    background: var(--ms-blue); color: white; padding: 10px 14px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; font-size: 14px; font-weight: 600;
  }
  button.ms-signin svg { width: 18px; height: 18px; }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 500;
  }
  .pill-green { background: rgba(63,185,80,0.15); color: var(--green); }
  .pill-yellow { background: rgba(210,153,34,0.2); color: var(--yellow); }
  .pill-red { background: rgba(248,81,73,0.15); color: var(--red); }
  .pill-blue { background: rgba(76,194,255,0.15); color: var(--accent); }
  .pill-purple { background: rgba(163,113,247,0.15); color: var(--accent-2); }
  .pill-gray { background: rgba(139,148,168,0.15); color: var(--muted); }
  .row-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .row-form label { color: var(--muted); font-size: 12px; }
  .badge { font-family: ui-monospace, monospace; font-size: 11px; }
  .calendar-status-card {
    display: flex; gap: 16px; align-items: center; padding: 12px; background: var(--panel-2);
    border-radius: 6px; margin-bottom: 16px;
  }
  .week-grid-wrap {
    position: relative;
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    -webkit-overflow-scrolling: touch;
  }
  .week-grid {
    display: grid;
    grid-template-columns: 140px repeat(7, minmax(150px, 1fr));
    min-width: 100%;
    width: max-content;
  }
  .week-grid .cell {
    padding: 6px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 60px;
    font-size: 11px;
    background: var(--panel);
  }
  .week-grid .header-cell {
    background: var(--panel-2);
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    font-size: 10px;
    padding: 8px;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .week-grid .name-cell {
    background: var(--panel-2);
    font-weight: 500;
    position: sticky;
    left: 0;
    z-index: 1;
    border-right: 2px solid var(--border);
  }
  .week-grid .header-cell.name-cell { z-index: 3; }
  @media (max-width: 768px) {
    .week-grid {
      grid-template-columns: 100px repeat(7, minmax(130px, 1fr));
    }
    .week-grid .cell { padding: 4px; font-size: 10px; min-height: 50px; }
    .week-grid .header-cell { padding: 6px 4px; font-size: 9px; }
    .week-grid .name-cell { font-size: 11px; }
  }
  .entry-bubble {
    background: rgba(76,194,255,0.1); border-left: 3px solid var(--accent);
    padding: 4px 6px; border-radius: 3px; margin-bottom: 4px;
  }
  .entry-bubble.unmatched { background: rgba(248,81,73,0.1); border-left-color: var(--red); }
  .entry-bubble.leave { background: rgba(210,153,34,0.1); border-left-color: var(--yellow); }
  .entry-bubble.standby { background: rgba(139,148,168,0.1); border-left-color: var(--muted); }
  .entry-bubble.training { background: rgba(163,113,247,0.1); border-left-color: var(--accent-2); }
  .entry-bubble.admin { background: rgba(63,185,80,0.1); border-left-color: var(--green); }
  .entry-bubble.internal { background: rgba(255,123,114,0.1); border-left-color: var(--pink); }
  .entry-bubble.pm { background: rgba(76,194,255,0.08); border-left-color: var(--accent); }
  .entry-bubble.cm { background: rgba(210,153,34,0.12); border-left-color: var(--yellow); }
  .entry-bubble.hr { background: rgba(255,142,200,0.1); border-left-color: #ff8ec8; }
  .entry-bubble.presales { background: rgba(255,152,0,0.12); border-left-color: #ff9800; }
  .entry-bubble.others { background: rgba(139,148,168,0.08); border-left-color: var(--muted); }
  .entry-bubble.mc { background: rgba(210,153,34,0.18); border-left-color: var(--yellow); }
  .entry-bubble strong { display: block; font-size: 11px; }
  .entry-bubble .small { color: var(--muted); font-size: 10px; }
  /* Review states (Step 26b) */
  .entry-bubble.flagged { outline: 1.5px solid var(--yellow); position: relative; }
  .entry-bubble.flagged::after { content: '⚑'; position: absolute; top: 2px; right: 4px; color: var(--yellow); font-size: 11px; line-height: 1; }
  .entry-bubble.rejected { outline: 1.5px solid var(--red); opacity: 0.6; position: relative; }
  .entry-bubble.rejected strong, .entry-bubble.rejected .small { text-decoration: line-through; }
  .entry-bubble.rejected::after { content: '✕'; position: absolute; top: 2px; right: 4px; color: var(--red); font-size: 11px; line-height: 1; }
  .entry-bubble[data-clickable="1"] { cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
  .entry-bubble[data-clickable="1"]:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
  .review-reason-hint { display: block; font-size: 10px; color: var(--muted); font-style: italic; margin-top: 2px; line-height: 1.3; }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 24px; min-width: 480px; max-width: 90vw; max-height: 90vh; overflow: auto;
  }
  .modal h3 { margin-top: 0; }
  .modal-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .modal-row label { width: 100px; color: var(--muted); font-size: 12px; }
  .modal-row select, .modal-row input { flex: 1; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .team-mgmt-table { width: 100%; }
  .team-mgmt-table td { padding: 6px 8px; }
  .team-mgmt-table input[type=checkbox], .team-mgmt-table input[type=radio] {
    width: 16px; height: 16px; cursor: pointer;
  }
  .lead-marker { color: var(--yellow); font-weight: 600; }
  #signin-page {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  #signin-page .panel { width: 380px; }
  .divider {
    display: flex; align-items: center; gap: 12px; margin: 16px 0;
    color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--panel); border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    padding: 12px 16px; border-radius: 6px; max-width: 320px;
    z-index: 200; animation: slideIn 0.2s ease-out;
  }
  .toast.error { border-left-color: var(--red); }
  .toast.success { border-left-color: var(--green); }
  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
</style>
</head>
<body>

<div id="boot-loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0e14;color:#9aa4b2;font:14px/1.4 -apple-system,Segoe UI,sans-serif;z-index:9999">Loading AZNET Scheduler…</div>
<div id="signin-page" style="display:none">
  <div class="panel" style="text-align: center;">
    <img src="logo.png" alt="AZNET" style="height: 100px; width: auto; margin: 0 auto 16px; display: block;">
    <h2 style="margin-top: 0;">AZNET Scheduler</h2>
    <p style="color: var(--muted); font-size: 13px;">Sign in with your Microsoft 365 (@aznet.sg) account.</p>
    <button id="ms-signin-btn" class="ms-signin">
      <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>

      </svg>
      Sign in with Microsoft
    </button>

    <p style="color: var(--muted); font-size: 12px; margin-top: 0;">Magic link fallback:</p>
    <input type="email" id="signin-email" placeholder="you@aznet.sg" style="width: 100%; margin-bottom: 8px;">
    <button id="signin-btn" class="secondary" style="width: 100%;">Send magic link</button>

</div>

<div id="app" style="display:none">
  <header>
    <h1 style="display: flex; align-items: center; gap: 10px; margin: 0;">
      <img src="logo.png" alt="AZNET" style="height: 32px; width: auto;">
      <span>AZNET Scheduler</span>
    </h1>
    <nav>
      <button data-view="my-schedule" class="active">My Schedule</button>

      <button id="nav-audit-btn" data-view="audit">Audit</button>
      <button id="signout-btn" class="secondary">Sign out</button>
    </nav>
  </header>
  <main>
    <div id="view-my-schedule"></div>
    <div id="view-team-week" style="display:none"></div>
    <div id="view-projects" style="display:none"></div>
    <div id="view-manage" style="display:none"></div>
    <div id="view-utilisation" style="display:none"></div>
    <div id="view-audit" style="display:none"></div>
  </main>
</div>

<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
const SUPABASE_URL = 'https://tixgkvsyifuqanupmcic.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpeGdrdnN5aWZ1cWFudXBtY2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjQyMDEsImV4cCI6MjA5MjYwMDIwMX0.lnXmf4bV6orj64EVpuGS5AgmvpVhM4Amgcvhj39fbtU';
const MS_TENANT_ID = 'aznet.sg';
const MS_CLIENT_ID = '390064d5-c524-4166-ae2f-faeef82da5e5';
const MS_REDIRECT_URI = `${SUPABASE_URL}/functions/v1/ms-oauth-callback`;

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    flowType: 'implicit',

    storageKey: 'sb-aznet-scheduler-auth',
    lock: async (name, acquireTimeout, fn) => fn()
  }
});

let currentUser = null;
let currentEngineer = null;
let isManager = false;
let canSeePricing = false;

function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('en-SG', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: true });
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-SG', { day: '2-digit', month: 'short' });
}
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit', hour12: true });
}
function hoursBetween(start, end) {
  return ((new Date(end) - new Date(start)) / (1000 * 60 * 60)).toFixed(2);
}
function toast(msg, kind = 'info') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${kind}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Friendly display labels for entry_type. Single source of truth — used in My
// Schedule, Team Week, review modal, edit modal, and any reporting view.
const TYPE_LABELS = {
  project: 'Project',
  pm: 'PM',
  cm: 'CM',
  presales: 'Pre-sales',
  admin: 'Admin',
  hr: 'HR',
  training: 'Training',
  standby: 'Standby',
  leave: 'Leave',
  mc: 'Medical Leave',
  internal: 'Internal',
  others: 'Other',
  unmatched: 'Unmatched'
};
function typeLabel(t) { return TYPE_LABELS[t] || t || ''; }

// Concurrency guard: onAuthStateChange + the manual checkSession() at end of
// script can fire this in parallel during page boot. Only one runs at a time.
let _checkSessionRunning = false;
let _checkSessionPending = false;

function hideBootLoading() {
  const b = document.getElementById('boot-loading');
  if (b) b.style.display = 'none';
}
function showSigninFallback(reason) {
  hideBootLoading();
  const signinEl = document.getElementById('signin-page');
  const appEl = document.getElementById('app');
  if (signinEl) signinEl.style.display = 'flex';
  if (appEl) appEl.style.display = 'none';
  if (reason) console.warn('Falling back to signin:', reason);
}

async function checkSession() {
  if (_checkSessionRunning) { _checkSessionPending = true; return; }
  _checkSessionRunning = true;

  // Watchdog: if anything below hangs > 8s (e.g. Supabase auth stuck on stale
  // state after refresh), force the signin page so the screen is never blank.
  let watchdogFired = false;
  const watchdog = setTimeout(() => {
    watchdogFired = true;
    showSigninFallback('checkSession watchdog timeout (8s)');
    toast('Sign-in took too long. Please try again.', 'error');
  }, 8000);

  const signinEl = document.getElementById('signin-page');
  const appEl = document.getElementById('app');
  try {
    console.log('[checkSession] start');
    const { data: { session }, error: sessionErr } = await sb.auth.getSession();
    if (watchdogFired) return;
    console.log('[checkSession] getSession ok, session?', !!session);
    if (sessionErr) throw sessionErr;
    if (!session) {
      hideBootLoading();
      signinEl.style.display = 'flex';
      appEl.style.display = 'none';
      return;
    }
    if (!session.user.email || !session.user.email.toLowerCase().endsWith('@aznet.sg')) {
      toast('Only @aznet.sg accounts can use this app.', 'error');
      hideBootLoading();
      signinEl.style.display = 'flex';
      appEl.style.display = 'none';
      try { await sb.auth.signOut(); } catch (_) {}
      return;
    }
    currentUser = session.user;
    await loadCurrentEngineer();
    if (watchdogFired) return;
    console.log('[checkSession] loadCurrentEngineer ok, engineer?', !!currentEngineer);
    if (!currentEngineer) {
      hideBootLoading();
      signinEl.style.display = 'flex';
      appEl.style.display = 'none';
      return;
    }
    // Hide manager-only tabs for non-managers (defense in depth — RPCs also check)
    const manageBtn = document.getElementById('nav-manage-btn');
    if (manageBtn) manageBtn.style.display = isManager ? '' : 'none';
    const projectsBtn = document.getElementById('nav-projects-btn');
    if (projectsBtn) projectsBtn.style.display = isManager ? '' : 'none';
    const auditBtn = document.getElementById('nav-audit-btn');
    if (auditBtn) auditBtn.style.display = isManager ? '' : 'none';
    const utilBtn = document.getElementById('nav-utilisation-btn');
    if (utilBtn) utilBtn.style.display = '';  // visible to all engineers; price_ps hidden server-side
    // Show app FIRST, then render — so a render error doesn't leave a blank page
    hideBootLoading();
    signinEl.style.display = 'none';
    appEl.style.display = 'block';
    try {
      await renderMySchedule();
    } catch (renderErr) {
      console.error('renderMySchedule failed:', renderErr);
      toast('UI error: ' + (renderErr.message || renderErr), 'error');
    }
  } catch (err) {
    console.error('Session init failed:', err);
    if (!watchdogFired) {
      toast('Sign-in error: ' + (err.message || err), 'error');
      hideBootLoading();
      signinEl.style.display = 'flex';
      appEl.style.display = 'none';
    }
  } finally {
    clearTimeout(watchdog);
    _checkSessionRunning = false;
    if (_checkSessionPending) {
      _checkSessionPending = false;
      checkSession();
    }
  }
}

async function loadCurrentEngineer() {
  const { data, error } = await sb.from('engineers').select('*').eq('email', currentUser.email).maybeSingle();
  if (error || !data) {
    toast('Your @aznet.sg account is not yet registered as an engineer. Ask a manager.', 'error');
    return;
  }
  currentEngineer = data;
  isManager = data.is_manager;
  canSeePricing = data.can_see_pricing;
}

document.getElementById('ms-signin-btn').addEventListener('click', async () => {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'azure',
    options: {
      scopes: 'openid profile email',
      redirectTo: window.location.origin + window.location.pathname
    }
  });
  if (error) toast('Microsoft sign-in failed: ' + error.message, 'error');
});

document.getElementById('signin-btn').addEventListener('click', async () => {
  const email = document.getElementById('signin-email').value.trim();
  if (!email.endsWith('@aznet.sg')) {
    toast('Only @aznet.sg emails are allowed', 'error'); return;
  }
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + window.location.pathname }
  });
  if (error) { toast(error.message, 'error'); return; }
  document.getElementById('signin-msg').textContent = 'Magic link sent. Check your email.';
});

document.getElementById('signout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});

document.querySelectorAll('nav button[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button[data-view]').forEach(b => b.classList.remove('active'));

    document.getElementById('view-utilisation').style.display = v === 'utilisation' ? 'block' : 'none';
    document.getElementById('view-audit').style.display = v === 'audit' ? 'block' : 'none';
    if (v === 'team-week') renderTeamWeek();
    if (v === 'projects') renderProjects();
    if (v === 'manage') renderManage();
    if (v === 'utilisation') renderUtilisation();
    if (v === 'audit') renderAuditLog();
    if (v === 'my-schedule') renderMySchedule();
  });
});

async function renderMySchedule() {
  if (!currentEngineer) return;
  const root = document.getElementById('view-my-schedule');

  const { data: connStatus } = await sb.rpc('rpc_my_calendar_status');
  const conn = (connStatus && connStatus[0]) || null;

// Render the "My projects" panel: shows projects this engineer is assigned to,
// project creation date, and the date of the engineer's most recent entry on
// each project. Two queries (assignments + last-entry-per-project) joined in JS.
async function renderMyProjects() {
  const tbody = document.getElementById('my-projects-body');
  const counter = document.getElementById('my-projects-count');
  if (!tbody || !currentEngineer) return;

  const { data: assignments, error } = await sb
    .from('project_engineers')
    .select('is_lead, projects(id, project_code, name, status, created_at, customers:customer_id(name), end_user:end_user_id(name))')
    .eq('engineer_id', currentEngineer.id);

  if (error) {
    tbody.innerHTML = `<tr><td colspan="7" style="color: var(--red); padding: 14px;">Failed to load: ${escapeHtml(error.message)}</td></tr>`;
    return;
  }

  const rows = (assignments || []).filter(a => a.projects && a.projects.status !== 'deleted');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--muted); padding: 14px;">No project assignments yet. Ask a manager to assign you.</td></tr>';
    counter.textContent = '0 projects';
    return;
  }

  // Fetch the engineer's most-recent work_entry start_at per project, in one
  // bounded query. Order desc + take first occurrence per project_id in JS.
  const projectIds = rows.map(a => a.projects.id);
  const { data: entries } = await sb
    .from('work_entries')
    .select('project_id, start_at')
    .eq('engineer_id', currentEngineer.id)
    .in('project_id', projectIds)
    .order('start_at', { ascending: false });
  const lastByProject = new Map();
  for (const e of (entries || [])) {
    if (!lastByProject.has(e.project_id)) lastByProject.set(e.project_id, e.start_at);
  }

  // Sort: lead first, then most-recently-active, then alpha by project_code
  rows.sort((a, b) => {
    if (a.is_lead !== b.is_lead) return a.is_lead ? -1 : 1;
    const la = lastByProject.get(a.projects.id) || '';
    const lb = lastByProject.get(b.projects.id) || '';
    if (la !== lb) return lb.localeCompare(la);
    return (a.projects.project_code || '').localeCompare(b.projects.project_code || '');
  });

  tbody.innerHTML = rows.map(a => {
    const p = a.projects;
    const lastAt = lastByProject.get(p.id);
    const lastCell = lastAt
      ? `<span>${escapeHtml(fmtDate(lastAt))}</span>`
      : '<span style="color: var(--muted); font-style: italic;">never</span>';
    const statusCls = p.status === 'active' ? 'green' : p.status === 'completed' ? 'blue' : 'gray';
    const roleBadge = a.is_lead
      ? '<span class="pill pill-purple">lead</span>'
      : '<span class="pill pill-gray">team</span>';
    return `
      <tr>
        <td>
          <span class="badge">${escapeHtml(p.project_code || '')}</span>
          <br><span style="font-size: 11px; color: var(--muted);">${escapeHtml(p.name || '—')}</span>
        </td>
        <td style="font-size: 11px;">${escapeHtml(p.customers?.name || '—')}</td>
        <td style="font-size: 11px;">${escapeHtml(p.end_user?.name || '—')}</td>
        <td style="font-size: 11px;">${escapeHtml(fmtDate(p.created_at))}</td>
        <td style="font-size: 11px;">${lastCell}</td>
        <td>${roleBadge}</td>
        <td><span class="pill pill-${statusCls}">${escapeHtml(p.status)}</span></td>
      </tr>
    `;
  }).join('');
  counter.textContent = `${rows.length} project${rows.length===1?'':'s'}`;
}

function renderEntriesTable(entries) {
  const filter = document.getElementById('entries-filter').value;
  const tbody = document.getElementById('my-entries-body');
  let rows = entries || [];
  if (filter === 'unmatched') rows = rows.filter(e => e.match_status === 'unmatched');
  if (filter === 'unconfirmed') rows = rows.filter(e => !e.confirmed);
  tbody.innerHTML = rows.map(e => {
    const proj = e.projects;
    const cust = e.customers;
    // Build the Project / Maintenance cell:
    //   - PM/CM entries: show maintenance badge, and project code too if linked
    //   - Project entries: show project code
    //   - Other types (leave/admin/etc.): em dash
    let projMaintCell = '—';
    if (e.entry_type === 'pm' || e.entry_type === 'cm') {
      const tag = e.entry_type.toUpperCase();
      const tagColor = e.entry_type === 'pm' ? 'var(--accent)' : 'var(--yellow)';
      const tagBg = e.entry_type === 'pm' ? 'rgba(76,194,255,0.2)' : 'rgba(210,153,34,0.2)';
      const projTail = proj ? ` <span class="badge">${escapeHtml(proj.project_code)}</span>` : '';
      projMaintCell = `<span class="badge" style="background: ${tagBg}; color: ${tagColor}; font-weight: 700;">${tag}</span>${projTail}`;
    } else if (proj) {
      projMaintCell = `<span class="badge">${escapeHtml(proj.project_code)}</span>`;
    }
    return `<tr>
      <td>${e.confirmed ? '<span style="color: var(--green); margin-right: 4px;" title="Reviewed">✓</span>' : ''}${escapeHtml(fmtDateTime(e.start_at))}</td>
      <td>${escapeHtml(e.raw_title || '—')} ${e.is_cutover ? '<span class="pill pill-purple">cutover</span>' : ''}</td>
      <td>${cust ? escapeHtml(cust.name) : '—'}</td>
      <td>${projMaintCell}</td>
      <td>${hoursBetween(e.start_at, e.end_at)}</td>
      <td><span class="pill pill-gray">${escapeHtml(e.source)}</span></td>
      <td>${e.match_status === 'matched'
        ? '<span class="pill pill-green">matched</span>'
        : '<span class="pill pill-red">unmatched</span>'}
        ${e.confirmed ? ' <span class="pill pill-blue">confirmed</span>' : ''}</td>
      <td><button class="small secondary edit-entry-btn" data-id="${e.id}">Edit</button></td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('.edit-entry-btn').forEach(btn => {
    btn.addEventListener('click', () => openEntryEditModal(btn.dataset.id, entries));
  });
}

async function populateProjectDropdown(selectId, selectedId = null, engineerId = null) {
  let query = sb.from('projects')
    .select('id, project_code, name, customer_id, customers:customer_id(name)')
    .eq('status', 'active')
    .order('project_code');
  // When engineerId provided, restrict to that engineer's assigned projects
  // by first fetching their assignment list. Two-step (rather than a JOIN)
  // because PostgREST doesn't make that join straightforward.
  if (engineerId) {
    const { data: assigns } = await sb.from('project_engineers')
      .select('project_id').eq('engineer_id', engineerId);
    const ids = (assigns || []).map(a => a.project_id);
    if (ids.length === 0) {
      const sel = document.getElementById(selectId);
      if (sel) sel.innerHTML = '<option value="">No assigned projects</option>';
      return;
    }
    query = query.in('id', ids);
  }
  const { data } = await query;
  const sel = document.getElementById(selectId);
  if (!sel) return;
  const cur = sel.value;
  const placeholder = engineerId ? 'Select your project…' : 'Select project…';
  sel.innerHTML = `<option value="">${placeholder}</option>` + (data || []).map(p =>
    `<option value="${p.id}" data-customer-id="${p.customer_id || ''}" ${p.id === selectedId ? 'selected' : ''}>${escapeHtml(p.project_code)} — ${escapeHtml(p.name || '')} (${escapeHtml(p.customers?.name || 'no SI')})</option>`
  ).join('');
  if (selectedId) sel.value = selectedId;
  else if (cur) sel.value = cur;
}

async function populateCustomerDropdown(selectId, selectedId = null) {
  const { data } = await sb.from('customers').select('id, name').eq('active', true).order('name');
  const sel = document.getElementById(selectId);
  if (!sel) return;
  sel.innerHTML = '<option value="">Customer (SI)…</option>' + (data || []).map(c =>
    `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${escapeHtml(c.name)}</option>`
  ).join('');
  if (selectedId) sel.value = selectedId;
}

            <option value="mc" ${entry.entry_type==='mc'?'selected':''}>Medical Leave</option>

function startMsCalendarOAuth() {
  const params = new URLSearchParams({
    client_id: MS_CLIENT_ID,
    response_type: 'code',
    redirect_uri: MS_REDIRECT_URI,
    response_mode: 'query',
    scope: 'openid profile email offline_access Calendars.Read User.Read',
    state: currentEngineer.id
  });
  window.location.href = `https://login.microsoftonline.com/${MS_TENANT_ID}/oauth2/v2.0/authorize?${params}`;
}
