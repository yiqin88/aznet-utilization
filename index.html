             <button class="small secondary set-status-btn" data-id="${p.id}" data-status="cancelled">Cancel</button>`
          : `<button class="small secondary set-status-btn" data-id="${p.id}" data-status="active">Reopen</button>`}
        <button class="small danger delete-project-btn" data-id="${p.id}" data-code="${escapeHtml(p.full_tag || ('aznet-'+p.project_code))}">Delete</button>
      </td>
    </tr>
  `;
}

function _applyProjectFilters() {
  const f = _projectFilters;
  return (_projectsCache.projects || []).filter(p => {
    if (f.status && p.status !== f.status) return false;
    if (f.customer && String(p.customer_id || '') !== f.customer) return false;
    if (f.enduser && String(p.end_user_id || '') !== f.enduser) return false;
    if (f.name) {
      const needle = f.name.toLowerCase();
      const inName = (p.name || '').toLowerCase().includes(needle);
      const inCode = (p.project_code || '').toLowerCase().includes(needle);
      if (!inName && !inCode) return false;
    }
    if (f.engineer) {
      const onTeam = (p.project_engineers || []).some(pe => String(pe.engineer_id) === f.engineer);
      if (!onTeam) return false;
    }
    return true;
  });
}

function _renderProjectsTbody() {
  const tbody = document.getElementById('projects-tbody');
  if (!tbody) return;
  const filtered = _applyProjectFilters();
  const total = (_projectsCache.projects || []).length;
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--muted); padding: 20px; font-size: 12px;">No projects match the current filters.${total > 0 ? ' <a href="#" id="projects-filter-clear-inline" style="color: var(--blue);">Clear filters</a>' : ''}</td></tr>`;
    document.getElementById('projects-filter-clear-inline')?.addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('filter-proj-clear')?.click();
    });
  } else {
    tbody.innerHTML = filtered.map(_projectRowHtml).join('');
  }
  const countEl = document.getElementById('projects-filter-count');
  if (countEl) {
    countEl.textContent = filtered.length === total
      ? `${total} project${total===1?'':'s'}`
      : `${filtered.length} of ${total} projects`;
  }
  _bindProjectRowHandlers();
}

function _bindProjectRowHandlers() {
  const projects = _projectsCache.projects || [];
  const customers = _projectsCache.customers || [];
  document.querySelectorAll('#projects-tbody .set-status-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const { error } = await sb.rpc('rpc_set_project_status', {
        p_project_id: btn.dataset.id,
        p_status: btn.dataset.status
      });
      if (error) { toast(error.message, 'error'); return; }
      toast('Status updated.', 'success');
      await renderProjects();
    });
  });
  document.querySelectorAll('#projects-tbody .manage-team-btn').forEach(btn => {
    btn.addEventListener('click', () => openManageTeamModal(btn.dataset.id));
  });
  document.querySelectorAll('#projects-tbody .edit-project-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const proj = projects.find(p => p.id === btn.dataset.id);
      if (proj) openEditProjectModal(proj, customers);
    });
  });
  document.querySelectorAll('#projects-tbody .delete-project-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const code = btn.dataset.code;
      const reason = prompt(`Delete project ${code}?\n\nThis is a soft delete — the project becomes hidden but recoverable from the audit log.\n\nReason (recorded in audit log):`);
      if (reason === null) return;
      if (!reason.trim()) { toast('A deletion reason is required.', 'error'); return; }
      const { error } = await sb.rpc('rpc_soft_delete_project', {
        p_project_id: btn.dataset.id,
        p_reason: reason.trim()
      });
      if (error) { toast(error.message, 'error'); return; }
      toast('Project deleted.', 'success');
      await renderProjects();
    });
  });
}

async function renderTeamWeek() {
  const root = document.getElementById('view-team-week');
  const today = new Date();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((today.getDay() + 6) % 7));
  monday.setHours(0,0,0,0);
  // Apply navigation offset
  monday.setDate(monday.getDate() + (_teamWeekOffset * 7));
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 7);

  const { data: engineers } = await sb.from('engineers').select('*').eq('active', true).order('name');
  const { data: entries } = await sb.from('work_entries')
    .select('*, projects(project_code), customers:customer_id(name)')
    .gte('start_at', monday.toISOString()).lt('start_at', sunday.toISOString());
  // Pre-fetch active projects + customers for the manager review modal dropdowns
  // (manager-only — engineers don't open the modal)
  let projectsForModal = [], customersForModal = [];
  if (isManager) {
    const [pRes, cRes] = await Promise.all([
      sb.from('projects').select('id, project_code, name, customer_id, status').eq('status', 'active').order('project_code'),
      sb.from('customers').select('id, name').eq('active', true).order('name')
    ]);
    projectsForModal = pRes.data || [];
    customersForModal = cRes.data || [];
  }

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    days.push(d);
  }
  const cells = {};
  (entries || []).forEach(e => {
    const dayIdx = Math.floor((new Date(e.start_at) - monday) / (1000*60*60*24));
    const key = `${e.engineer_id}|${dayIdx}`;
    (cells[key] = cells[key] || []).push(e);
  });

  const _twBounds = _teamWeekBounds();
  const canPrev = _teamWeekOffset > _twBounds.back;
  const canNext = _teamWeekOffset < _twBounds.forward;
  const offsetLabel = _teamWeekOffset === 0 ? 'This week'
    : _teamWeekOffset === -1 ? 'Last week'
    : _teamWeekOffset === 1 ? 'Next week'
    : _teamWeekOffset < 0 ? `${Math.abs(_teamWeekOffset)} weeks ago`
    : `${_teamWeekOffset} weeks ahead`;

  root.innerHTML = `
    <div class="panel">
      <div style="display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;">
        <h2 style="margin: 0;">Team Week — ${fmtDate(monday.toISOString())} to ${fmtDate(new Date(sunday-1).toISOString())}</h2>
        <div style="display: flex; gap: 6px; align-items: center;">
          <button class="small secondary" id="tw-prev" ${canPrev ? '' : 'disabled style="opacity:0.4;cursor:not-allowed;"'}>◀ Prev</button>
          <button class="small secondary" id="tw-today" ${_teamWeekOffset === 0 ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>Today</button>
          <button class="small secondary" id="tw-next" ${canNext ? '' : 'disabled style="opacity:0.4;cursor:not-allowed;"'}>Next ▶</button>
          <span style="font-size: 11px; color: var(--muted); margin-left: 8px;">${escapeHtml(offsetLabel)}</span>
        </div>
      </div>
      <p style="color: var(--muted); font-size: 11px; margin-top: 6px;">
        ↔ Swipe horizontally to see all 7 days${isManager ? ' · Tap any entry to flag/reject' : ''}
      </p>
      <div class="week-grid-wrap">
        <div class="week-grid">
          <div class="cell header-cell name-cell">Engineer</div>
          ${days.map(d => `<div class="cell header-cell">${d.toLocaleDateString('en-SG', { weekday: 'short' })}<br>${fmtDate(d.toISOString())}</div>`).join('')}
          ${(engineers || []).map(eng => `
            <div class="cell name-cell">${escapeHtml(eng.name)}</div>
            ${days.map((d, i) => {
              const items = cells[`${eng.id}|${i}`] || [];
              return `<div class="cell">${items.map(it => {
                const typeCls = it.match_status === 'unmatched' ? 'unmatched' : (it.entry_type !== 'project' ? it.entry_type : '');
                const reviewCls = (it.review_status === 'flagged' || it.review_status === 'rejected') ? it.review_status : '';
                const cls = [typeCls, reviewCls].filter(Boolean).join(' ');
                const isMaintenance = it.entry_type === 'pm' || it.entry_type === 'cm';
                const maintTag = isMaintenance
                  ? `<span class="badge" style="background: ${it.entry_type==='pm'?'rgba(76,194,255,0.2)':'rgba(210,153,34,0.2)'}; color: ${it.entry_type==='pm'?'var(--accent)':'var(--yellow)'}; padding: 1px 4px; font-size: 9px; font-weight: 700; margin-right: 4px;">${it.entry_type.toUpperCase()}</span>`
                  : '';
                const customerLabel = it.customers?.name ? escapeHtml(it.customers.name) : (it.entry_type !== 'project' ? it.entry_type : 'unmatched');
                const projLabel = it.projects?.project_code ? `<span class="badge">${escapeHtml(it.projects.project_code)}</span>` : '';
                const reasonHint = (it.review_status === 'flagged' || it.review_status === 'rejected') && it.review_reason
                  ? `<span class="review-reason-hint">${it.review_status === 'flagged' ? '⚑' : '✕'} ${escapeHtml(it.review_reason)}</span>`
                  : '';
                const clickable = isManager ? 'data-clickable="1"' : '';
                return `<div class="entry-bubble ${cls}" data-entry-id="${it.id}" ${clickable}>
                  <strong>${maintTag}${customerLabel}</strong>
                  <span class="small">${fmtTime(it.start_at)} · ${hoursBetween(it.start_at, it.end_at)}h</span>
                  ${projLabel}
                  ${reasonHint}
                </div>`;
              }).join('')}</div>`;
            }).join('')}
          `).join('')}
        </div>
      </div>
    </div>
  `;

  // Wire navigation buttons
  const prevBtn = document.getElementById('tw-prev');
  const todayBtn = document.getElementById('tw-today');
  const nextBtn = document.getElementById('tw-next');
  if (prevBtn) prevBtn.addEventListener('click', () => {
    if (_teamWeekOffset > _twBounds.back) { _teamWeekOffset--; renderTeamWeek(); }
  });
  if (todayBtn) todayBtn.addEventListener('click', () => {
    if (_teamWeekOffset !== 0) { _teamWeekOffset = 0; renderTeamWeek(); }
  });
  if (nextBtn) nextBtn.addEventListener('click', () => {
    if (_teamWeekOffset < _twBounds.forward) { _teamWeekOffset++; renderTeamWeek(); }
  });

  // Wire click-to-review for managers (Step 26b)
  if (isManager) {
    const engineersById = {};
    (engineers || []).forEach(e => { engineersById[e.id] = e; });
    root.querySelectorAll('.entry-bubble[data-clickable="1"]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.entryId;
        const entry = (entries || []).find(e => e.id === id);
        if (entry) openReviewModal(entry, engineersById, projectsForModal, customersForModal);
      });
    });
  }
}

// ──────────────────────────────────────────────────────────────────
// Review modal (Step 26b) — manager-only flag/reject/reset on a work entry
// ──────────────────────────────────────────────────────────────────
function openReviewModal(entry, engineersById, projectsList, customersList) {
  if (!isManager) return;
  const c = document.getElementById('modal-container');
  const engName = engineersById?.[entry.engineer_id]?.name || '—';
  const reviewerName = entry.reviewed_by ? (engineersById?.[entry.reviewed_by]?.name || 'Unknown') : null;
  const status = entry.review_status || 'approved';
  const statusBadge = status === 'approved'
    ? '<span style="color: var(--green);">● Approved</span>'
    : status === 'flagged'
      ? '<span style="color: var(--yellow);">⚑ Flagged</span>'
      : '<span style="color: var(--red);">✕ Rejected</span>';
  const customerLabel = entry.customers?.name ? escapeHtml(entry.customers.name) : '—';

  // Friendly type label (uses global TYPE_LABELS)
  // Modal shows full name including the long-form for PM/CM
  const TYPE_LABELS_MODAL = {
    ...TYPE_LABELS,
    pm: 'PM (Preventive Maintenance)',
    cm: 'CM (Corrective Maintenance)'
  };
  const typeLabel = TYPE_LABELS_MODAL[entry.entry_type] || entry.entry_type;

  // Re-categorise is always available now: manager can change the entry's type
  // (project/pm/cm/admin/hr/presales/training/standby/leave/internal/others).
  // Project + Customer rows are only meaningful for project/pm/cm — they're
  // hidden via JS when the type dropdown is set to anything else.
  const PROJECT_LIKE_TYPES = ['project', 'pm', 'cm'];
  const currentProjectId = entry.project_id || '';
  const currentCustomerId = entry.customer_id || '';

  // Source provenance block — managers want to see whether an entry came from
  // calendar sync (and whether the engineer created it themselves vs. was invited)
  // or was manually entered.
  let sourceBlockHtml = '';
  if (entry.source === 'calendar_sync') {
    const orgEmail = entry.organizer_email || '';
    const engineerEmail = (engineersById?.[entry.engineer_id]?.email || '').toLowerCase();
    const orgEmailLower = orgEmail.toLowerCase();
    const isSelfCreated = orgEmail && engineerEmail && orgEmailLower === engineerEmail;
    const hasOrgEmail = !!orgEmail;
    const domains = Array.isArray(entry.attendee_domains) ? entry.attendee_domains : [];
    const hasAttendees = domains.length > 0;

    let sourceLine;
    if (!hasOrgEmail) {
      sourceLine = `<span style="color: var(--muted); font-style: italic;">organizer not yet recorded — next sync will populate</span>`;
    } else if (isSelfCreated) {
      const flavour = hasAttendees
        ? `Self-created in Outlook by ${escapeHtml(engName)} · invited others`
        : `Self-scheduled in Outlook by ${escapeHtml(engName)} · no invitees`;
      sourceLine = `<span style="color: var(--text);">${flavour}</span>`;
    } else {
      sourceLine = `<span style="color: var(--muted);">Invited by</span> <span style="color: var(--text);">${escapeHtml(orgEmail)}</span>`;
    }
    const attendeesHtml = hasAttendees
      ? domains.map(d => `<span class="badge" style="margin-right: 4px;">${escapeHtml(d)}</span>`).join('')
      : '<span style="color: var(--muted); font-style: italic;">none</span>';
    sourceBlockHtml = `
      <div style="border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; font-size: 12px;">
        <div style="font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Source: calendar sync</div>
        <div style="line-height: 1.7;">
          ${sourceLine}<br>
          <span style="color: var(--muted);">Attendee domains:</span> ${attendeesHtml}
        </div>
      </div>
    `;
  } else {
    sourceBlockHtml = `
      <div style="border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px;">
        <div style="font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;">Source: manual entry</div>
        <div style="font-size: 12px; color: var(--muted);">Logged directly by ${escapeHtml(engName)}.</div>
      </div>
    `;
  }

  // Build project options
  const projectOptions = (projectsList || []).map(p =>
    `<option value="${p.id}" data-customer-id="${p.customer_id || ''}" ${p.id === currentProjectId ? 'selected' : ''}>${escapeHtml(p.project_code)}${p.name ? ' — ' + escapeHtml(p.name) : ''}</option>`
  ).join('');
  const customerOptions = (customersList || []).map(cu =>
    `<option value="${cu.id}" ${cu.id === currentCustomerId ? 'selected' : ''}>${escapeHtml(cu.name)}</option>`
  ).join('');

  c.innerHTML = `
    <div class="modal-backdrop">
      <div class="modal" style="min-width: 480px;">
        <h3>Review entry</h3>
        <div style="color: var(--muted); font-size: 12px; margin-bottom: 12px; line-height: 1.6;">
          <strong style="color: var(--text);">${escapeHtml(engName)}</strong><br>
          ${escapeHtml(fmtDateTime(entry.start_at))} → ${escapeHtml(fmtDateTime(entry.end_at))} · ${hoursBetween(entry.start_at, entry.end_at)}h<br>
          Type: ${escapeHtml(typeLabel)}<br>
          ${entry.raw_title ? 'Title: ' + escapeHtml(entry.raw_title) + '<br>' : ''}
          Status: ${statusBadge}
          ${reviewerName ? `<br><span style="font-size: 11px;">Last reviewed by ${escapeHtml(reviewerName)} · ${fmtDateTime(entry.reviewed_at)}</span>` : ''}
          ${entry.review_reason ? `<br><span style="font-size: 11px; font-style: italic;">"${escapeHtml(entry.review_reason)}"</span>` : ''}
        </div>

        ${sourceBlockHtml}

        <div style="border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px;">
          <div style="font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Re-categorise (optional)</div>
          <div class="modal-row">
            <label>Type</label>
            <select id="reassign-type">
              <option value="project" ${entry.entry_type==='project'?'selected':''}>Project</option>
              <option value="pm" ${entry.entry_type==='pm'?'selected':''}>PM (Preventive Maintenance)</option>
              <option value="cm" ${entry.entry_type==='cm'?'selected':''}>CM (Corrective Maintenance)</option>
              <option value="presales" ${entry.entry_type==='presales'?'selected':''}>Pre-sales</option>
              <option value="admin" ${entry.entry_type==='admin'?'selected':''}>Admin</option>
              <option value="hr" ${entry.entry_type==='hr'?'selected':''}>HR</option>
              <option value="training" ${entry.entry_type==='training'?'selected':''}>Training</option>
              <option value="standby" ${entry.entry_type==='standby'?'selected':''}>Standby</option>
              <option value="leave" ${entry.entry_type==='leave'?'selected':''}>Leave</option>
              <option value="mc" ${entry.entry_type==='mc'?'selected':''}>Medical Leave</option>
              <option value="internal" ${entry.entry_type==='internal'?'selected':''}>Internal</option>
              <option value="others" ${entry.entry_type==='others'?'selected':''}>Other</option>
            </select>
          </div>
          <div class="modal-row" id="reassign-project-row">
            <label>Project</label>
            <select id="reassign-project">
              <option value="">— none —</option>
              ${projectOptions}
            </select>
          </div>
          <div class="modal-row" id="reassign-customer-row">
            <label>Customer</label>
            <select id="reassign-customer">
              <option value="">— none —</option>
              ${customerOptions}
            </select>
            <span id="reassign-customer-hint" style="font-size: 10px; color: var(--muted); margin-top: 2px;"></span>
          </div>
        </div>

        <div style="border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px;">
          <div style="font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Review action</div>
          <div class="modal-row">
            <label>Action</label>
            <select id="review-action">
              <option value="none" selected>No change</option>
              <option value="flag">Flag (engineer should fix)</option>
              <option value="reject">Reject (exclude from utilisation)</option>
              <option value="reset">Reset to approved</option>
            </select>
          </div>
          <div class="modal-row" id="review-reason-row">
            <label>Reason</label>
            <textarea id="review-reason" rows="2" placeholder="Required when flagging, rejecting, or re-categorising"></textarea>
          </div>
        </div>

        <div class="modal-actions">
          <button id="review-cancel" class="secondary">Cancel</button>
          <button id="review-submit">Save</button>
        </div>
      </div>
    </div>
  `;

  // Show/hide project + customer rows based on selected type, and auto-fill
  // customer from project when type is project/pm/cm.
  const typeSel = document.getElementById('reassign-type');
  const projSel = document.getElementById('reassign-project');
  const custSel = document.getElementById('reassign-customer');
  const custHint = document.getElementById('reassign-customer-hint');
  const projRow = document.getElementById('reassign-project-row');
  const custRow = document.getElementById('reassign-customer-row');

  function syncTypeVisibility() {
    const isProjectLike = PROJECT_LIKE_TYPES.includes(typeSel.value);
    projRow.style.display = isProjectLike ? '' : 'none';
    custRow.style.display = isProjectLike ? '' : 'none';
    if (!isProjectLike) {
      // Clear project/customer when switching away from project-like types,
      // since the RPC will reject project_id for non-project/pm/cm types anyway.
      projSel.value = '';
      custSel.value = '';
      custSel.disabled = false;
      custHint.textContent = '';
    }
  }
  function syncCustomerFromProject() {
    if (projSel.value) {
      const opt = projSel.options[projSel.selectedIndex];
      const derivedCustomerId = opt?.dataset?.customerId || '';
      custSel.value = derivedCustomerId;
      custSel.disabled = true;
      custHint.textContent = 'Auto-filled from project. Clear project to edit customer manually.';
    } else {
      custSel.disabled = false;
      custHint.textContent = '';
    }
  }
  typeSel.addEventListener('change', () => { syncTypeVisibility(); syncReasonRequired(); });
  projSel.addEventListener('change', () => { syncCustomerFromProject(); syncReasonRequired(); });
  custSel.addEventListener('change', syncReasonRequired);
  syncTypeVisibility();
  syncCustomerFromProject();

  // Reason field is required for flag/reject AND for any re-categorisation
  function syncReasonRequired() {
    const action = document.getElementById('review-action').value;
    const typeChanged = typeSel.value !== entry.entry_type;
    const projChanged = (projSel.value || '') !== currentProjectId;
    const custChanged = (custSel.value || '') !== currentCustomerId;
    const needsReason = action === 'flag' || action === 'reject' || typeChanged || projChanged || custChanged;
    document.getElementById('review-reason-row').style.display = needsReason ? '' : 'none';
  }
  document.getElementById('review-action').addEventListener('change', syncReasonRequired);
  syncReasonRequired();

  document.getElementById('review-cancel').addEventListener('click', () => { c.innerHTML = ''; });
  document.getElementById('review-submit').addEventListener('click', async () => {
    const action = document.getElementById('review-action').value;
    const reason = document.getElementById('review-reason').value.trim();
    const newEntryType = typeSel.value;
    const isProjectLike = PROJECT_LIKE_TYPES.includes(newEntryType);
    const newProjectId = isProjectLike ? (projSel.value || null) : null;
    const newCustomerId = isProjectLike ? (custSel.value || null) : null;
    const typeChanged = newEntryType !== entry.entry_type;
    const projChanged = (newProjectId || '') !== currentProjectId;
    const custChanged = (newCustomerId || '') !== currentCustomerId;
    const recategorise = typeChanged || projChanged || custChanged;

    if ((action === 'flag' || action === 'reject' || recategorise) && !reason) {
      toast('Reason is required when flagging, rejecting, or re-categorising.', 'error');
      return;
    }
    if (action === 'none' && !recategorise) {
      toast('Nothing to save — change an action or re-categorise.', 'error');
      return;
    }
    // Project entries must reference a project. PM/CM may have one but don't require it.
    if (newEntryType === 'project' && !newProjectId) {
      toast('Project entries must reference a project. Pick one or change the type.', 'error');
      return;
    }

    const btn = document.getElementById('review-submit');
    btn.disabled = true; btn.textContent = 'Saving…';

    // Step 1: re-categorise if needed (this auto-flags via the RPC)
    if (recategorise) {
      const { error: rErr } = await sb.rpc('rpc_reassign_work_entry', {
        p_entry_id: entry.id,
        p_entry_type: newEntryType,
        p_project_id: newProjectId,
        p_customer_id: newCustomerId,
        p_is_cutover: entry.is_cutover,
        p_review_reason: reason
      });
      if (rErr) {
        toast('Re-categorise failed: ' + rErr.message, 'error');
        btn.disabled = false; btn.textContent = 'Save';
        return;
      }
    }
    // Step 2: explicit review action overrides the auto-flag if set
    if (action !== 'none') {
      const { error: revErr } = await sb.rpc('rpc_review_work_entry', {
        p_entry_id: entry.id,
        p_action: action,
        p_reason: action === 'reset' ? null : reason
      });
      if (revErr) {
        toast('Review action failed: ' + revErr.message, 'error');
        btn.disabled = false; btn.textContent = 'Save';
        return;
      }
    }

    const parts = [];
    if (recategorise) parts.push('re-categorised');
    if (action === 'flag') parts.push('flagged');
    else if (action === 'reject') parts.push('rejected');
    else if (action === 'reset') parts.push('reset to approved');
    toast('Entry ' + parts.join(' and ') + '.', 'success');
    c.innerHTML = '';
    await renderTeamWeek();
  });
}

async function renderProjects() {
  const root = document.getElementById('view-projects');
  if (!isManager) {
    root.innerHTML = '<div class="panel"><h2>Not authorised</h2><p style="color: var(--muted);">The Projects tab is for managers only.</p></div>';
    return;
  }
  const { data: engineers } = await sb.from('engineers').select('*').order('name');
  const { data: customers } = await sb.from('customers').select('*').order('name');
  const { data: projects, error: projErr } = await sb.from('projects')
    .select(`
      id, project_code, name, status, full_tag, customer_id, end_user_id,
      quoted_office_mandays, quoted_cutover_mandays, price_ps, source, po_number,
      customer:customer_id(id, name),
      end_user:end_user_id(id, name),
      project_engineers(engineer_id, is_lead, engineers!project_engineers_engineer_id_fkey(id, name))
    `).neq('status', 'deleted').neq('status', 'pending_confirmation').order('project_code');
  if (projErr) { console.error('Projects query failed:', projErr); toast('Failed to load projects: ' + projErr.message, 'error'); }

  // Pending POs awaiting confirmation (Step B2)
  const { data: pendingPOs, error: pendingErr } = await sb.from('pending_po_creations')
    .select('*')
    .eq('status', 'pending')
    .gt('expires_at', new Date().toISOString())
    .order('created_at', { ascending: false });
  if (pendingErr) { console.error('Pending POs query failed:', pendingErr); }

  root.innerHTML = `
    ${(pendingPOs && pendingPOs.length > 0) ? `
    <div class="panel" style="border-left: 3px solid var(--yellow);">
      <h2>Pending POs <span style="font-size: 12px; font-weight: normal; color: var(--muted);">(${pendingPOs.length} awaiting confirmation)</span></h2>
      <p style="color: var(--muted); font-size: 11px; margin-top: -8px;">Auto-extracted from forwarded PO emails. Activate to create the project. Cowork polls twice daily; expires in 7 days.</p>
      <table>
        <thead>
          <tr>
            <th>Token</th><th>Forwarder</th><th>Subject</th><th>Proposed code</th>
            <th>PO #</th><th>SI / EU</th><th>Value</th><th>MDs (O / C)</th><th>Warnings</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${pendingPOs.map(po => {
            const warnings = (po.extraction_warnings || []);
            const warningHtml = warnings.length > 0
              ? warnings.map(w => `<span class="pill pill-yellow" style="font-size: 10px;">${escapeHtml(w)}</span>`).join(' ')
              : '<span style="color: var(--muted); font-size: 11px;">—</span>';
            const eu = po.proposed_eu_name ? escapeHtml(po.proposed_eu_name) : '<span style="color: var(--muted);">—</span>';
            const si = po.proposed_si_name ? escapeHtml(po.proposed_si_name) : '<span style="color: var(--red);">missing</span>';
            const value = po.proposed_price_ps !== null ? 'S$' + Number(po.proposed_price_ps).toLocaleString() : '—';
            const mds = `${po.proposed_office_md ?? '?'} / ${po.proposed_cutover_md ?? '?'}`;
            const poNum = po.proposed_po_number ? escapeHtml(po.proposed_po_number) : '<span style="color: var(--muted);">—</span>';
            return `
              <tr>
                <td style="font-family: monospace; font-size: 10px;">${escapeHtml(po.token)}</td>
                <td style="font-size: 11px;">${escapeHtml(po.forwarded_by_email)}</td>
                <td style="font-size: 11px; max-width: 200px; overflow: hidden; text-overflow: ellipsis;" title="${escapeHtml(po.raw_subject || '')}">${escapeHtml(po.raw_subject || '—')}</td>
                <td style="font-family: monospace; font-size: 11px;">${escapeHtml(po.proposed_project_code || '—')}</td>
                <td style="font-family: monospace; font-size: 11px;">${poNum}</td>
                <td style="font-size: 11px;">${si}<br><span style="color: var(--muted);">→ ${eu}</span></td>
                <td style="font-size: 11px;">${value}</td>
                <td style="font-size: 11px;">${mds}</td>
                <td>${warningHtml}</td>
                <td>
                  <button class="small secondary po-edit-btn" data-token="${escapeHtml(po.token)}">Edit & Activate</button>
                  <button class="small po-activate-btn" data-token="${escapeHtml(po.token)}">Activate</button>
                  <button class="small danger po-reject-btn" data-token="${escapeHtml(po.token)}">Reject</button>
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
    ` : ''}

    <div class="panel">
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
        <h2 style="margin: 0; flex: 1;">Projects <span id="projects-filter-count" style="font-size: 12px; font-weight: normal; color: var(--muted);"></span></h2>
        <button id="create-project-toggle" class="small secondary">+ New project</button>
      </div>

      <div id="create-project-section" style="display: none; padding: 14px; background: var(--panel-2); border-radius: 6px; margin-bottom: 20px;">
        <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 500;">Create new project</div>
        <div class="row-form" style="margin-bottom: 0;">
          <input type="text" id="proj-code" placeholder="Code (without aznet- prefix, e.g. mandai-itpkg1)">
          <select id="proj-customer"><option value="">SI customer (Invoiced)…</option>${(customers || []).map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}</select>
          <select id="proj-enduser"><option value="">End user (Beneficiary)…</option>${(customers || []).map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}</select>
          <input type="text" id="proj-name" placeholder="Name (e.g. Mandai IT Infra Pkg 1)">
          <input type="number" id="proj-office-md" placeholder="Office MDs" step="0.5" min="0" style="max-width: 110px;">
          <input type="number" id="proj-cutover-md" placeholder="Cutover MDs" step="0.5" min="0" style="max-width: 120px;">
          <input type="number" id="proj-price" placeholder="PS price (SGD)" step="100" min="0" style="max-width: 140px;">
          <input type="text" id="proj-po" placeholder="PO number (optional)" style="max-width: 180px;">
          <button id="proj-add">Create project</button>
        </div>
      </div>

      <div style="margin-bottom: 12px;">
        <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 500;">Filter</div>
        <div class="row-form" style="margin-bottom: 0;">
          <input type="text" id="filter-proj-name" placeholder="Filter by name or code…" style="max-width: 220px;">
          <select id="filter-proj-customer">
            <option value="">All SI customers</option>
            ${(customers || []).map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}
          </select>
          <select id="filter-proj-enduser">
            <option value="">All end users</option>
            ${(customers || []).map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}
          </select>
          <select id="filter-proj-engineer">
            <option value="">All engineers</option>
            ${(engineers || []).map(e => `<option value="${e.id}">${escapeHtml(e.name)}</option>`).join('')}
          </select>
          <select id="filter-proj-status" style="max-width: 140px;">
            <option value="active">Active</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
            <option value="">All statuses</option>
          </select>
          <button id="filter-proj-clear" class="small secondary">Clear filters</button>
        </div>
      </div>

      <table>
        <thead>
          <tr><th>Code</th><th>Name</th><th>Customer (SI)</th><th>End User</th><th>Team</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="projects-tbody"></tbody>
      </table>
    </div>
  `;

  document.getElementById('proj-add').addEventListener('click', async () => {
    const code = document.getElementById('proj-code').value.trim();
    const name = document.getElementById('proj-name').value.trim();
    if (!code || !name) { toast('Code and name are required.', 'error'); return; }
    const officeMd = parseFloat(document.getElementById('proj-office-md').value) || 0;
    const cutoverMd = parseFloat(document.getElementById('proj-cutover-md').value) || 0;
    const priceRaw = document.getElementById('proj-price').value;
    const price = priceRaw === '' ? null : parseFloat(priceRaw);
    const poNumber = document.getElementById('proj-po').value.trim() || null;
    const { error } = await sb.rpc('rpc_create_project', {
      p_project_code: code,
      p_customer_id: document.getElementById('proj-customer').value || null,
      p_project_name: name,
      p_quoted_office_mandays: officeMd,
      p_quoted_cutover_mandays: cutoverMd,
      p_price_ps: price,
      p_end_user_id: document.getElementById('proj-enduser').value || null,
      p_po_number: poNumber
    });
    if (error) { toast(error.message, 'error'); return; }
    toast('Project created.', 'success');
    await renderProjects();
  });

  // ---- Projects table: populate cache and wire filters ----
  document.getElementById('create-project-toggle')?.addEventListener('click', () => {
    const section = document.getElementById('create-project-section');
    const btn = document.getElementById('create-project-toggle');
    if (!section || !btn) return;
    const isHidden = section.style.display === 'none';
    section.style.display = isHidden ? 'block' : 'none';
    btn.textContent = isHidden ? '− Hide form' : '+ New project';
  });
  _projectsCache = {
    projects: projects || [],
    customers: customers || [],
    engineers: engineers || []
  };

  // Restore previous filter values across renderProjects() calls
  const _filterIds = {
    name: 'filter-proj-name',
    customer: 'filter-proj-customer',
    enduser: 'filter-proj-enduser',
    engineer: 'filter-proj-engineer',
    status: 'filter-proj-status'
  };
  Object.entries(_filterIds).forEach(([key, id]) => {
    const el = document.getElementById(id);
    if (el) el.value = _projectFilters[key] ?? '';
  });

  const _onProjectFilterChange = () => {
    _projectFilters = {
      name: document.getElementById('filter-proj-name').value.trim(),
      customer: document.getElementById('filter-proj-customer').value,
      enduser: document.getElementById('filter-proj-enduser').value,
      engineer: document.getElementById('filter-proj-engineer').value,
      status: document.getElementById('filter-proj-status').value
    };
    _renderProjectsTbody();
  };
  Object.values(_filterIds).forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener(el.tagName === 'INPUT' ? 'input' : 'change', _onProjectFilterChange);
  });
  document.getElementById('filter-proj-clear')?.addEventListener('click', () => {
    _projectFilters = { name: '', customer: '', enduser: '', engineer: '', status: 'active' };
    document.getElementById('filter-proj-name').value = '';
    document.getElementById('filter-proj-customer').value = '';
    document.getElementById('filter-proj-enduser').value = '';
    document.getElementById('filter-proj-engineer').value = '';
    document.getElementById('filter-proj-status').value = 'active';
    _renderProjectsTbody();
  });

  _renderProjectsTbody();

  // Pending PO actions (Step B2)
  document.querySelectorAll('.po-activate-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const token = btn.dataset.token;
      if (!confirm(`Activate PO ${token}? The project will be created with the extracted values as-is.`)) return;
      btn.disabled = true; btn.textContent = '…';
      const { error } = await sb.rpc('rpc_confirm_pending_po', { p_token: token });
      if (error) {
        toast('Activation failed: ' + error.message, 'error');
        btn.disabled = false; btn.textContent = 'Activate';
        return;
      }
      toast('Project created from PO.', 'success');
      await renderProjects();
    });
  });

  document.querySelectorAll('.po-reject-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const token = btn.dataset.token;
      const reason = prompt(`Reject PO ${token}? (e.g. duplicate, wrong forward, customer cancelled)\n\nReason:`);
      if (reason === null) return;
      const { error } = await sb.rpc('rpc_reject_pending_po', {
        p_token: token,
        p_reason: reason.trim() || null
      });
      if (error) { toast('Reject failed: ' + error.message, 'error'); return; }
      toast('PO rejected.', 'success');
      await renderProjects();
    });
  });

  document.querySelectorAll('.po-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const po = (pendingPOs || []).find(p => p.token === btn.dataset.token);
      if (po) openConfirmPOModal(po, customers || []);
    });
  });
}

async function renderManage() {
  const root = document.getElementById('view-manage');
  // Defense in depth: if a non-manager somehow reaches this view (e.g. cached
  // nav button still visible), don't render it. RLS/RPCs also block writes.
  if (!isManager) {
    root.innerHTML = '<div class="panel"><h2>Not authorised</h2><p style="color: var(--muted);">The Manage tab is for managers only.</p></div>';
    return;
  }
  const { data: engineers } = await sb.from('engineers').select('*').order('name');
  const { data: customers } = await sb.from('customers').select('*').order('name');

  root.innerHTML = `
    <div class="panel">
      <h2>Add engineer</h2>
      <div class="row-form">
        <input type="text" id="eng-name" placeholder="Name">
        <input type="email" id="eng-email" placeholder="Email (@aznet.sg)">
        <label>Type
          <select id="eng-type">
            <option value="professional">Professional</option>
            <option value="resident">Resident</option>
            <option value="remote">Remote</option>
            <option value="management">Management</option>
          </select>
        </label>
        <label><input type="checkbox" id="eng-clocking" checked> Clocking required</label>
        <label><input type="checkbox" id="eng-mgr"> Is manager</label>
        <label><input type="checkbox" id="eng-pricing"> Can see pricing</label>
        <button id="eng-add">Add engineer</button>
      </div>
      <p style="color: var(--muted); font-size: 12px;">⚠️ With Microsoft SSO, engineers can sign in directly — no need to manually create the Supabase auth user.</p>
      <h3>Engineers</h3>
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Type</th><th>Clocking</th><th>Manager</th><th>Active</th></tr></thead>
        <tbody>
          ${(engineers || []).map(e => `
            <tr>
              <td>${escapeHtml(e.name)}</td>
              <td>${escapeHtml(e.email)}</td>
              <td><span class="pill pill-gray">${escapeHtml(e.engineer_type)}</span></td>
              <td>${e.requires_clocking ? '✓' : '—'}</td>
              <td>${e.is_manager ? '✓' : '—'}</td>
              <td>${e.active ? '✓' : '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <div class="panel">
      <h2>Customers</h2>
      <div class="row-form">
        <input type="text" id="cust-name" placeholder="Name">
        <input type="text" id="cust-domains" placeholder="email-domain.com (comma-separated for multiple)">
        <button id="cust-add">Add customer</button>
      </div>
      <table>
        <thead><tr><th>Name</th><th>Domains</th><th>Active</th><th></th></tr></thead>
        <tbody>
          ${(customers || []).map(c => `
            <tr>
              <td>${escapeHtml(c.name)}</td>
              <td>${(c.email_domains || []).map(d => `<span class="badge">${escapeHtml(d)}</span>`).join(' ') || '—'}</td>
              <td>${c.active ? '✓' : '—'}</td>
              <td><button class="small secondary edit-domains-btn" data-id="${c.id}" data-domains="${(c.email_domains || []).join(',')}">Edit domains</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById('eng-add').addEventListener('click', async () => {
    const { error } = await sb.rpc('rpc_add_engineer', {
      p_name: document.getElementById('eng-name').value,
      p_email: document.getElementById('eng-email').value,
      p_engineer_type: document.getElementById('eng-type').value,
      p_requires_clocking: document.getElementById('eng-clocking').checked,
      p_is_manager: document.getElementById('eng-mgr').checked,
      p_can_see_pricing: document.getElementById('eng-pricing').checked
    });
    if (error) { toast(error.message, 'error'); return; }
    toast('Engineer added.', 'success');
    await renderManage();
  });

  document.getElementById('cust-add').addEventListener('click', async () => {
    const { error } = await sb.rpc('rpc_add_customer', {
      p_name: document.getElementById('cust-name').value,
      p_email_domains: document.getElementById('cust-domains').value.split(',').map(s => s.trim()).filter(Boolean)
    });
    if (error) { toast(error.message, 'error'); return; }
    toast('Customer added.', 'success');
    await renderManage();
  });

  document.querySelectorAll('.edit-domains-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const newDomains = prompt('Enter comma-separated domains:', btn.dataset.domains);
      if (newDomains === null) return;
      const { error } = await sb.rpc('rpc_update_customer', {
        p_customer_id: btn.dataset.id,
        p_email_domains: newDomains.split(',').map(s => s.trim()).filter(Boolean)
      });
      if (error) { toast(error.message, 'error'); return; }
      toast('Updated.', 'success');
      await renderManage();
    });
  });
}

function openEditProjectModal(project, customers) {
  if (!isManager) return;
  const c = document.getElementById('modal-container');
  const customerOpts = (customers || []).map(cu =>
    `<option value="${cu.id}">${escapeHtml(cu.name)}</option>`
  ).join('');

  c.innerHTML = `
    <div class="modal-backdrop">
      <div class="modal" style="min-width: 480px;">
        <h3>Edit project</h3>
        <div style="color: var(--muted); font-size: 12px; margin-bottom: 12px;">
          <span class="badge">${escapeHtml(project.full_tag || ('aznet-'+project.project_code))}</span>
          ${project.source === 'po_email' ? '<span class="pill pill-blue" style="margin-left: 6px;">from PO</span>' : ''}
          <br><span style="font-size: 10px;">Project code is immutable. To rename, delete and re-create.</span>
        </div>
        <div class="modal-row">
          <label>Name</label>
          <input type="text" id="ep-name" value="${escapeHtml(project.name || '')}">
        </div>
        <div class="modal-row">
          <label>Customer (SI)</label>
          <select id="ep-customer">
            <option value="">— none —</option>
            ${customerOpts}
          </select>
        </div>
        <div class="modal-row">
          <label>End user (EU)</label>
          <select id="ep-enduser">
            <option value="">— none —</option>
            ${customerOpts}
          </select>
        </div>
        <div class="modal-row">
          <label>Office MDs</label>
          <input type="number" id="ep-office-md" step="0.5" min="0" value="${project.quoted_office_mandays ?? 0}">
        </div>
        <div class="modal-row">
          <label>Cutover MDs</label>
          <input type="number" id="ep-cutover-md" step="0.5" min="0" value="${project.quoted_cutover_mandays ?? 0}">
        </div>
        <div class="modal-row">
          <label>PS price (SGD)</label>
          <input type="number" id="ep-price" step="100" min="0" value="${project.price_ps ?? ''}">
        </div>
        <div class="modal-row">
          <label>PO number</label>
          <input type="text" id="ep-po" placeholder="(optional)" value="${escapeHtml(project.po_number ?? '')}">
        </div>
        <div class="modal-row">
          <label>Status</label>
          <select id="ep-status">
            <option value="active" ${project.status==='active'?'selected':''}>Active</option>
            <option value="completed" ${project.status==='completed'?'selected':''}>Completed</option>
            <option value="cancelled" ${project.status==='cancelled'?'selected':''}>Cancelled</option>
          </select>
        </div>
        <div class="modal-actions">
          <button id="ep-cancel" class="secondary">Cancel</button>
          <button id="ep-save">Save</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('ep-cancel').addEventListener('click', () => { c.innerHTML = ''; });

  // Set selected values for dropdowns (cleaner than regex-injecting selected attrs)
  if (project.customer_id) document.getElementById('ep-customer').value = project.customer_id;
  if (project.end_user_id) document.getElementById('ep-enduser').value = project.end_user_id;

  document.getElementById('ep-save').addEventListener('click', async () => {
    const btn = document.getElementById('ep-save');
    btn.disabled = true; btn.textContent = 'Saving…';
    const priceRaw = document.getElementById('ep-price').value;
    // PO: send the trimmed value (empty string clears, real value sets).
    const poRaw = document.getElementById('ep-po').value.trim();
    const { error } = await sb.rpc('rpc_update_project', {
      p_project_id: project.id,
      p_project_name: document.getElementById('ep-name').value.trim() || null,
      p_customer_id: document.getElementById('ep-customer').value || null,
      p_end_user_id: document.getElementById('ep-enduser').value || null,
      p_quoted_office_mandays: parseFloat(document.getElementById('ep-office-md').value) || 0,
      p_quoted_cutover_mandays: parseFloat(document.getElementById('ep-cutover-md').value) || 0,
      p_price_ps: priceRaw === '' ? null : parseFloat(priceRaw),
      p_status: document.getElementById('ep-status').value,
      p_po_number: poRaw  // sent as '' when cleared, real value when set
    });
    if (error) {
      toast('Update failed: ' + error.message, 'error');
      btn.disabled = false; btn.textContent = 'Save';
      return;
    }
    toast('Project updated.', 'success');
    c.innerHTML = '';
    await renderProjects();
  });
}

function openConfirmPOModal(po, customers) {
  if (!isManager) return;
  const c = document.getElementById('modal-container');
  const customerOpts = (customers || []).map(cu =>
    `<option value="${cu.id}">${escapeHtml(cu.name)}</option>`
  ).join('');
  const warnings = (po.extraction_warnings || []);
  const warningHtml = warnings.length > 0
    ? '<div style="background: rgba(210,153,34,0.1); border: 1px solid var(--yellow); padding: 8px; border-radius: 4px; margin-bottom: 12px; font-size: 11px;">⚠ ' + warnings.map(w => escapeHtml(w)).join('; ') + '</div>'
    : '';

  c.innerHTML = `
    <div class="modal-backdrop">
      <div class="modal" style="min-width: 520px;">
        <h3>Edit & Activate PO</h3>
        <div style="color: var(--muted); font-size: 11px; margin-bottom: 8px;">
          <span class="badge">${escapeHtml(po.token)}</span>
          forwarded by ${escapeHtml(po.forwarded_by_email)}<br>
          ${po.raw_subject ? 'Subject: ' + escapeHtml(po.raw_subject) + '<br>' : ''}
          ${po.proposed_quote_ref ? 'Quote ref: ' + escapeHtml(po.proposed_quote_ref) + '<br>' : ''}
          ${po.description_summary ? '<span style="font-style: italic;">' + escapeHtml(po.description_summary) + '</span>' : ''}
        </div>
        ${warningHtml}
        <div class="modal-row">
          <label>Project code</label>
          <input type="text" id="cp-code" value="${escapeHtml(po.proposed_project_code || '')}" placeholder="e.g. ptc-sbst-clearpass">
        </div>
        <div class="modal-row">
          <label>Project name</label>
          <input type="text" id="cp-name" value="${escapeHtml(po.proposed_project_name || '')}">
        </div>
        <div class="modal-row">
          <label>Customer (SI)</label>
          <select id="cp-customer">
            <option value="">— none —</option>
            ${customerOpts}
          </select>
          ${po.proposed_si_name && !po.proposed_si_customer_id ? `<span style="font-size: 10px; color: var(--yellow); margin-top: 2px;">Extracted "${escapeHtml(po.proposed_si_name)}" — no DB match. Pick or create customer first.</span>` : ''}
        </div>
        <div class="modal-row">
          <label>End user (EU)</label>
          <select id="cp-enduser">
            <option value="">— none —</option>
            ${customerOpts}
          </select>
          ${po.proposed_eu_name && !po.proposed_eu_customer_id ? `<span style="font-size: 10px; color: var(--muted); margin-top: 2px;">Extracted "${escapeHtml(po.proposed_eu_name)}" — no DB match.</span>` : ''}
        </div>
        <div class="modal-row">
          <label>Office MDs</label>
          <input type="number" id="cp-office-md" step="0.5" min="0" value="${po.proposed_office_md ?? 0}">
        </div>
        <div class="modal-row">
          <label>Cutover MDs</label>
          <input type="number" id="cp-cutover-md" step="0.5" min="0" value="${po.proposed_cutover_md ?? 0}">
        </div>
        <div class="modal-row">
          <label>PS price (SGD)</label>
          <input type="number" id="cp-price" step="100" min="0" value="${po.proposed_price_ps ?? ''}">
        </div>
        <div class="modal-row">
          <label>PO number</label>
          <input type="text" id="cp-po" placeholder="(optional)" value="${escapeHtml(po.proposed_po_number ?? '')}">
        </div>
        <div class="modal-actions">
          <button id="cp-cancel" class="secondary">Cancel</button>
          <button id="cp-save">Activate</button>
        </div>
      </div>
    </div>
  `;

  if (po.proposed_si_customer_id) document.getElementById('cp-customer').value = po.proposed_si_customer_id;
  if (po.proposed_eu_customer_id) document.getElementById('cp-enduser').value = po.proposed_eu_customer_id;

  document.getElementById('cp-cancel').addEventListener('click', () => { c.innerHTML = ''; });
  document.getElementById('cp-save').addEventListener('click', async () => {
    const btn = document.getElementById('cp-save');
    btn.disabled = true; btn.textContent = 'Activating…';
    const priceRaw = document.getElementById('cp-price').value;
    const poRaw = document.getElementById('cp-po').value.trim() || null;
    const { error } = await sb.rpc('rpc_confirm_pending_po', {
      p_token: po.token,
      p_project_code: document.getElementById('cp-code').value.trim() || null,
      p_project_name: document.getElementById('cp-name').value.trim() || null,
      p_customer_id: document.getElementById('cp-customer').value || null,
      p_end_user_id: document.getElementById('cp-enduser').value || null,
      p_quoted_office_mandays: parseFloat(document.getElementById('cp-office-md').value) || 0,
      p_quoted_cutover_mandays: parseFloat(document.getElementById('cp-cutover-md').value) || 0,
      p_price_ps: priceRaw === '' ? null : parseFloat(priceRaw),
      p_po_number: poRaw
    });
    if (error) {
      toast('Activation failed: ' + error.message, 'error');
      btn.disabled = false; btn.textContent = 'Activate';
      return;
    }
    toast('Project created from PO.', 'success');
    c.innerHTML = '';
    await renderProjects();
  });
}

// ──────────────────────────────────────────────────────────────────
// Utilisation view (Step C2)
//
// Reads from v_project_utilisation. Banded MDs for office, flat 1 MD per
// cutover entry. Click row → engineer breakdown (Step C3, not yet built).
// ──────────────────────────────────────────────────────────────────
let _utilFilter = 'all';  // 'all' | 'active' | 'at-risk' | 'over'

async function renderUtilisation() {
  const root = document.getElementById('view-utilisation');

  // Visible to all engineers. For non-managers, price_ps is excluded from the
  // SELECT to avoid sending revenue figures over the wire — even though the
  // current UI doesn't display $ anywhere. Engineers cannot see cost data
  // through this view.
  // Known gap: a curious engineer could still query the projects table directly
  // via the Supabase client and read price_ps. Proper hardening requires
  // column-level RLS or a price-stripped view; flagged for follow-up.
  const utilCols = isManager
    ? '*'
    : 'project_id,project_code,full_tag,name,status,source,po_number,created_at,completed_at,'
    + 'customer_id,customer_name,end_user_id,end_user_name,'
    + 'quoted_office_md,quoted_cutover_md,quoted_total_md,'
    + 'office_md_logged,cutover_md_logged,total_md_logged,'
    + 'office_hours_logged,cutover_hours_logged,office_entries,cutover_entries,'
    + 'distinct_engineers,last_entry_at,days_since_created,days_to_complete,days_since_activity,'
    + 'office_pct_used,cutover_pct_used,total_pct_used';

  const { data: rows, error } = await sb.from('v_project_utilisation')
    .select(utilCols)
    .order('total_pct_used', { ascending: false, nullsFirst: false });
  if (error) {
    root.innerHTML = `<div class="panel"><h2>Utilisation</h2><p style="color: var(--red);">Failed to load: ${escapeHtml(error.message)}</p></div>`;
    return;
  }

  const filtered = (rows || []).filter(r => {
    if (_utilFilter === 'all') return true;
    if (_utilFilter === 'active') return r.status === 'active';
    if (_utilFilter === 'at-risk') return r.total_pct_used !== null && r.total_pct_used >= 80 && r.total_pct_used <= 100;
    if (_utilFilter === 'over') return r.total_pct_used !== null && r.total_pct_used > 100;
    return true;
  });

  // Aggregate stats for header
  const totalQuoted = (rows || []).reduce((s, r) => s + (parseFloat(r.quoted_total_md) || 0), 0);
  const totalLogged = (rows || []).reduce((s, r) => s + (parseFloat(r.total_md_logged) || 0), 0);
  const overCount = (rows || []).filter(r => r.total_pct_used !== null && r.total_pct_used > 100).length;
  const atRiskCount = (rows || []).filter(r => r.total_pct_used !== null && r.total_pct_used >= 80 && r.total_pct_used <= 100).length;

  const filterChip = (key, label, count) => {
    const active = _utilFilter === key;
    return `<button class="util-filter-btn ${active ? 'active' : ''}" data-filter="${key}" style="padding: 4px 10px; font-size: 11px; border-radius: 12px; border: 1px solid var(--border); background: ${active ? 'var(--accent)' : 'transparent'}; color: ${active ? '#000' : 'var(--text)'}; cursor: pointer; margin-right: 6px;">${label}${count !== undefined ? ' · ' + count : ''}</button>`;
  };

  root.innerHTML = `
    <div class="panel">
      <h2>Utilisation</h2>
      <p style="color: var(--muted); font-size: 11px; margin-top: -8px;">
        Office MDs use banded calculation (&lt;1h=0.125, &lt;2h=0.25, &lt;4h=0.5, ≥4h=1). Cutover MDs flat 1 per entry.
        Excludes rejected entries and non-project entries.
      </p>

      <div style="display: flex; gap: 24px; align-items: center; margin-bottom: 12px; padding: 10px 12px; background: var(--panel); border-radius: 4px; flex-wrap: wrap;">
        <div style="font-size: 11px;">
          <span style="color: var(--muted);">Quoted total:</span>
          <strong style="color: var(--text); font-size: 14px;"> ${totalQuoted.toFixed(1)} MD</strong>
        </div>
        <div style="font-size: 11px;">
          <span style="color: var(--muted);">Logged total:</span>
          <strong style="color: var(--text); font-size: 14px;"> ${totalLogged.toFixed(1)} MD</strong>
        </div>
        <div style="font-size: 11px;">
          <span style="color: var(--muted);">At-risk (80-100%):</span>
          <strong style="color: var(--yellow); font-size: 14px;"> ${atRiskCount}</strong>
        </div>
        <div style="font-size: 11px;">
          <span style="color: var(--muted);">Over budget (&gt;100%):</span>
          <strong style="color: var(--red); font-size: 14px;"> ${overCount}</strong>
        </div>
      </div>

      <div style="margin-bottom: 12px;">
        ${filterChip('all', 'All', (rows || []).length)}
        ${filterChip('active', 'Active only', (rows || []).filter(r => r.status === 'active').length)}
        ${filterChip('at-risk', 'At-risk', atRiskCount)}
        ${filterChip('over', 'Over budget', overCount)}
      </div>

      <table>
        <thead>
          <tr>
            <th>Project</th>
            <th>Customer</th>
            <th>PO #</th>
            <th>Office MD<br><span style="font-weight: normal; color: var(--muted); font-size: 10px;">logged / quoted</span></th>
            <th>Cutover MD<br><span style="font-weight: normal; color: var(--muted); font-size: 10px;">logged / quoted</span></th>
            <th>% used</th>
            <th>Engineers</th>
            <th>Activity</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.length === 0 ? `
            <tr><td colspan="9" style="text-align: center; color: var(--muted); padding: 24px;">No projects match the current filter.</td></tr>
          ` : filtered.map(r => {
            const officeBar = renderUtilBar(r.office_md_logged, r.quoted_office_md);
            const cutoverBar = renderUtilBar(r.cutover_md_logged, r.quoted_cutover_md);
            const pct = r.total_pct_used;
            const pctColor = pct === null ? 'var(--muted)'
              : pct > 100 ? 'var(--red)'
              : pct >= 80 ? 'var(--yellow)'
              : 'var(--green)';
            const pctLabel = pct === null ? '—' : pct.toFixed(1) + '%';
            const lastEntry = r.last_entry_at ? fmtDate(r.last_entry_at) : null;
            const activityHtml = renderActivityCell(r);
            const statusCls = r.status==='active'?'green':r.status==='completed'?'blue':'gray';
            const poNum = r.po_number ? escapeHtml(r.po_number) : '<span style="color: var(--muted);">—</span>';
            return `
              <tr>
                <td>
                  <span class="badge">${escapeHtml(r.full_tag || ('aznet-'+r.project_code))}</span>
                  <br><span style="font-size: 11px; color: var(--muted);">${escapeHtml(r.name || '—')}</span>
                </td>
                <td style="font-size: 11px;">${escapeHtml(r.customer_name || '—')}${r.end_user_name && r.end_user_name !== r.customer_name ? `<br><span style="color: var(--muted);">→ ${escapeHtml(r.end_user_name)}</span>` : ''}</td>
                <td style="font-family: monospace; font-size: 11px;">${poNum}</td>
                <td>${officeBar}</td>
                <td>${cutoverBar}</td>
                <td><strong style="color: ${pctColor}; font-size: 14px;">${pctLabel}</strong></td>
                <td style="font-size: 11px;">${r.distinct_engineers || 0}</td>
                <td>${activityHtml}</td>
                <td><span class="pill pill-${statusCls}">${escapeHtml(r.status)}</span></td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Filter chip click handlers
  document.querySelectorAll('.util-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      _utilFilter = btn.dataset.filter;
      renderUtilisation();
    });
  });
}

// Helper: render a "logged / quoted" bar with a fill proportional to usage.
// Bar caps visually at 100% width but text shows true number even if over.
// Activity cell for the Utilisation tab. Shows last-entry date + lifespan info.
// Color cues for active projects: green/yellow/red based on staleness.
// Completed projects show duration instead of staleness.
function renderActivityCell(r) {
  const lastEntry = r.last_entry_at ? fmtDate(r.last_entry_at) : null;
  const daysSinceActivity = r.days_since_activity;  // null if no entries
  const daysSinceCreated = r.days_since_created ?? 0;
  const createdLabel = r.created_at ? fmtDate(r.created_at) : '—';
  const isCompleted = r.status === 'completed';
  const daysToComplete = r.days_to_complete;

  // Top line: activity recency for active; completion duration for completed
  let topMain, topColor, topSub = '';
  if (isCompleted) {
    topMain = daysToComplete !== null ? `Completed in ${daysToComplete}d` : 'Completed';
    topColor = 'var(--accent)';
  } else if (lastEntry === null) {
    topMain = 'No entries yet';
    topColor = 'var(--muted)';
  } else {
    if (daysSinceActivity <= 7) topColor = 'var(--green)';
    else if (daysSinceActivity <= 30) topColor = 'var(--yellow)';
    else topColor = 'var(--red)';
    topMain = lastEntry;
    if (daysSinceActivity > 0) topSub = `· ${daysSinceActivity}d ago`;
  }

  const ageLabel = !isCompleted && daysSinceCreated > 0 ? ` · ${daysSinceCreated}d old` : '';
  const bottomLine = `Started ${createdLabel}${ageLabel}`;

  return `
    <div style="font-size: 11px; line-height: 1.3;">
      <div style="color: ${topColor};"><strong>${escapeHtml(topMain)}</strong>${topSub ? ` <span style="color: var(--muted); font-weight: normal;">${escapeHtml(topSub)}</span>` : ''}</div>
      <div style="color: var(--muted); font-size: 10px; margin-top: 2px;">${escapeHtml(bottomLine)}</div>
    </div>
  `;
}

function renderUtilBar(logged, quoted) {
  const log = parseFloat(logged) || 0;
  const quo = parseFloat(quoted) || 0;
  if (quo === 0 && log === 0) return '<span style="color: var(--muted); font-size: 11px;">—</span>';
  const pct = quo > 0 ? (log / quo) * 100 : 0;
  const widthPct = Math.min(pct, 100);
  const overrun = pct > 100;
  const barColor = overrun ? 'var(--red)' : pct >= 80 ? 'var(--yellow)' : 'var(--green)';
  return `
    <div style="font-size: 11px; line-height: 1.2;">
      <div style="margin-bottom: 2px;"><strong>${log.toFixed(2)}</strong> / ${quo.toFixed(1)}</div>
      <div style="height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; position: relative;">
        <div style="height: 100%; width: ${widthPct}%; background: ${barColor}; transition: width 0.2s;"></div>
        ${overrun ? `<div style="position: absolute; top: 0; right: 0; height: 100%; width: 2px; background: var(--red);"></div>` : ''}
      </div>
    </div>
  `;
}

// ──────────────────────────────────────────────────────────────────
// Audit log view
// ──────────────────────────────────────────────────────────────────
async function renderAuditLog() {
  const root = document.getElementById('view-audit');
  if (!isManager) {
    root.innerHTML = '<div class="panel"><h2>Not authorised</h2><p style="color: var(--muted);">The Audit log is for managers only.</p></div>';
    return;
  }

  const { data: logs, error } = await sb.rpc('rpc_recent_audit_log', { p_limit: 100 });
  if (error) { root.innerHTML = `<div class="panel"><h2>Audit log</h2><p style="color: var(--red);">Failed to load: ${escapeHtml(error.message)}</p></div>`; return; }

  const actionPill = (a) => {
    const cls = a === 'insert' ? 'pill-green'
      : a === 'soft_delete' ? 'pill-red'
      : a === 'undelete' ? 'pill-blue'
      : a === 'delete' ? 'pill-red'
      : 'pill-gray';
    return `<span class="pill ${cls}">${escapeHtml(a)}</span>`;
  };

  const summarizeChange = (oldV, newV) => {
    if (!oldV && newV) return Object.keys(newV).slice(0, 3).map(k => `${k}=${JSON.stringify(newV[k])?.slice(0, 30)}`).join(', ');
    if (oldV && !newV) return '(deleted)';
    if (!oldV || !newV) return '';
    const diffs = [];
    for (const k of Object.keys(newV)) {
      if (k === 'updated_at' || k === 'created_at') continue;
      if (JSON.stringify(oldV[k]) !== JSON.stringify(newV[k])) {
        const o = JSON.stringify(oldV[k])?.slice(0, 30) || 'null';
        const n = JSON.stringify(newV[k])?.slice(0, 30) || 'null';
        diffs.push(`${k}: ${o} → ${n}`);
      }
    }
    return diffs.slice(0, 4).join('; ') || '(no value diff)';
  };

  root.innerHTML = `
    <div class="panel">
      <h2>Audit log</h2>
      <p style="color: var(--muted); font-size: 11px; margin-top: -8px;">Last 100 changes to projects and work entries. Most recent first.</p>
      <table>
        <thead>
          <tr><th>When</th><th>Table</th><th>Action</th><th>Record</th><th>Actor</th><th>Change</th></tr>
        </thead>
        <tbody>
          ${(logs || []).map(l => {
            const actorDisplay = l.actor_display
              ? escapeHtml(l.actor_display)
              : '<span style="color: var(--muted);">system</span>';
            return `
              <tr>
                <td style="font-size: 11px; color: var(--muted); white-space: nowrap;">${escapeHtml(fmtDateTime(l.changed_at))}</td>
                <td style="font-family: monospace; font-size: 11px;">${escapeHtml(l.table_name)}</td>
                <td>${actionPill(l.action)}</td>
                <td style="font-family: monospace; font-size: 10px;" title="${escapeHtml(l.record_id)}">${escapeHtml(l.record_id.slice(0, 8))}…</td>
                <td style="font-size: 11px;">${actorDisplay}</td>
                <td style="font-size: 11px; max-width: 400px; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(summarizeChange(l.old_values, l.new_values))}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

async function openManageTeamModal(projectId) {
  if (!isManager) { toast('Only managers can change project teams.', 'error'); return; }
  const { data: project } = await sb.from('projects')
    .select('id, project_code, name, full_tag').eq('id', projectId).maybeSingle();
  const { data: engineers } = await sb.from('engineers').select('id, name, email, active').eq('active', true).order('name');
  const { data: assignments } = await sb.from('project_engineers')
    .select('engineer_id, is_lead').eq('project_id', projectId);

  const assignedSet = new Set((assignments || []).map(a => a.engineer_id));
  const leadId = (assignments || []).find(a => a.is_lead)?.engineer_id || null;

  const c = document.getElementById('modal-container');
  c.innerHTML = `
    <div class="modal-backdrop">
      <div class="modal" style="min-width: 540px;">
        <h3>Manage team — ${escapeHtml(project?.full_tag || project?.project_code || '')}</h3>
        <div style="color: var(--muted); font-size: 12px; margin-bottom: 16px;">
          ${escapeHtml(project?.name || '')}<br>
          Tick to assign. Use the ★ column to mark exactly one engineer as the project lead.
        </div>
        <table class="team-mgmt-table">
          <thead>
            <tr><th style="width: 40px;">On</th><th style="width: 40px;" title="Lead">★</th><th>Engineer</th><th>Email</th></tr>
          </thead>
          <tbody>
            ${(engineers || []).map(e => `
              <tr>
                <td><input type="checkbox" class="assign-cb" data-eng="${e.id}" ${assignedSet.has(e.id) ? 'checked' : ''}></td>
                <td><input type="radio" name="lead-radio" class="lead-rb" data-eng="${e.id}" ${leadId === e.id ? 'checked' : ''}></td>
                <td>${escapeHtml(e.name)}</td>
                <td><span style="color: var(--muted); font-size: 12px;">${escapeHtml(e.email)}</span></td>
              </tr>
            `).join('')}
            <tr>
              <td colspan="2"><input type="radio" name="lead-radio" class="lead-rb" data-eng="" ${leadId === null ? 'checked' : ''}></td>
              <td colspan="2" style="color: var(--muted); font-size: 12px;">— no lead —</td>
            </tr>
          </tbody>
        </table>
        <div class="modal-actions">
          <button id="team-cancel" class="secondary">Cancel</button>
          <button id="team-save">Save</button>
        </div>
      </div>
    </div>
  `;

  c.querySelectorAll('.lead-rb').forEach(rb => {
    rb.addEventListener('change', () => {
      const engId = rb.dataset.eng;
      if (!engId) return;
      const cb = c.querySelector(`.assign-cb[data-eng="${engId}"]`);
      if (cb && !cb.checked) cb.checked = true;
    });
  });
  c.querySelectorAll('.assign-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      if (!cb.checked) {
        const rb = c.querySelector(`.lead-rb[data-eng="${cb.dataset.eng}"]`);
        if (rb && rb.checked) {
          rb.checked = false;
          c.querySelector('.lead-rb[data-eng=""]').checked = true;
        }
      }
    });
  });

  document.getElementById('team-cancel').addEventListener('click', () => c.innerHTML = '');
  document.getElementById('team-save').addEventListener('click', async () => {
    const targetAssigned = new Set();
    c.querySelectorAll('.assign-cb:checked').forEach(cb => targetAssigned.add(cb.dataset.eng));
    const targetLead = c.querySelector('.lead-rb:checked')?.dataset.eng || '';

    const errors = [];
    for (const a of (assignments || [])) {
      if (!targetAssigned.has(a.engineer_id)) {
        const { error } = await sb.rpc('rpc_unassign_engineer', { p_project_id: projectId, p_engineer_id: a.engineer_id });
        if (error) errors.push(error.message);
      }
    }
    for (const engId of targetAssigned) {
      if (!assignedSet.has(engId)) {
        const { error } = await sb.rpc('rpc_assign_engineer', { p_project_id: projectId, p_engineer_id: engId, p_is_lead: false });
        if (error) errors.push(error.message);
      }
    }
    if (targetLead) {
      const { error } = await sb.rpc('rpc_set_lead_engineer', { p_project_id: projectId, p_engineer_id: targetLead });
      if (error) errors.push(error.message);
    } else if (leadId) {
      const { error } = await sb.rpc('rpc_assign_engineer', { p_project_id: projectId, p_engineer_id: leadId, p_is_lead: false });
      if (error) errors.push(error.message);
    }

    if (errors.length) { toast(errors.join('; '), 'error'); return; }
    toast('Team updated.', 'success');
    c.innerHTML = '';
    await renderProjects();
  });
}

// Filter: only re-run checkSession on meaningful auth events. TOKEN_REFRESHED
// fires periodically and doesn't need a re-render; INITIAL_SESSION fires on
// listener attach which would race with the manual checkSession() below.
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') {
    console.log('[auth] event:', event);
    checkSession();
  }
});
checkSession();
