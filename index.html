<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>AZNET Scheduler</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #131823;
    --panel-2: #1a2030;
    --border: #232a3d;
    --text: #e6edf3;
    --muted: #8b94a8;
    --accent: #4cc2ff;
    --accent-2: #a371f7;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --pink: #ff7b72;
    --ms-blue: #2f6fdb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
  }
  header {
    background: var(--panel);
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  nav { display: flex; gap: 8px; margin-left: auto; }
  nav button {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px;
  }
  nav button.active { background: var(--accent); color: #000; border-color: var(--accent); }
  nav button:hover:not(.active) { border-color: var(--accent); }
  main { padding: 24px; max-width: 1400px; margin: 0 auto; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .panel h2 { margin-top: 0; font-size: 15px; color: var(--accent); }
  .panel h3 { font-size: 14px; color: var(--accent-2); margin-top: 24px; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  input, select, textarea {
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px; border-radius: 4px; font-size: 13px;
    font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent); border: 0; color: #000;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: transparent; color: var(--text); border: 1px solid var(--border);
  }
  button.danger { background: var(--red); color: white; }
  button.small { padding: 3px 8px; font-size: 11px; }
  button.ms-signin {
    background: var(--ms-blue); color: white; padding: 10px 14px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; font-size: 14px; font-weight: 600;
  }
  button.ms-signin svg { width: 18px; height: 18px; }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 500;
  }
  .pill-green { background: rgba(63,185,80,0.15); color: var(--green); }
  .pill-yellow { background: rgba(210,153,34,0.2); color: var(--yellow); }
  .pill-red { background: rgba(248,81,73,0.15); color: var(--red); }
  .pill-blue { background: rgba(76,194,255,0.15); color: var(--accent); }
  .pill-purple { background: rgba(163,113,247,0.15); color: var(--accent-2); }
  .pill-gray { background: rgba(139,148,168,0.15); color: var(--muted); }
  .row-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .row-form label { color: var(--muted); font-size: 12px; }
  .badge { font-family: ui-monospace, monospace; font-size: 11px; }
  .calendar-status-card {
    display: flex; gap: 16px; align-items: center; padding: 12px; background: var(--panel-2);
    border-radius: 6px; margin-bottom: 16px;
  }
  .week-grid-wrap {
    position: relative;
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    -webkit-overflow-scrolling: touch;
  }
  .week-grid {
    display: grid;
    grid-template-columns: 140px repeat(7, minmax(150px, 1fr));
    min-width: 100%;
    width: max-content;
  }
  .week-grid .cell {
    padding: 6px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 60px;
    font-size: 11px;
    background: var(--panel);
  }
  .week-grid .header-cell {
    background: var(--panel-2);
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    font-size: 10px;
    padding: 8px;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .week-grid .name-cell {
    background: var(--panel-2);
    font-weight: 500;
    position: sticky;
    left: 0;
    z-index: 1;
    border-right: 2px solid var(--border);
  }
  .week-grid .header-cell.name-cell { z-index: 3; }
  @media (max-width: 768px) {
    .week-grid {
      grid-template-columns: 100px repeat(7, minmax(130px, 1fr));
    }
    .week-grid .cell { padding: 4px; font-size: 10px; min-height: 50px; }
    .week-grid .header-cell { padding: 6px 4px; font-size: 9px; }
    .week-grid .name-cell { font-size: 11px; }
  }
  .entry-bubble {
    background: rgba(76,194,255,0.1); border-left: 3px solid var(--accent);
    padding: 4px 6px; border-radius: 3px; margin-bottom: 4px;
  }
  .entry-bubble.unmatched { background: rgba(248,81,73,0.1); border-left-color: var(--red); }
  .entry-bubble.leave { background: rgba(210,153,34,0.1); border-left-color: var(--yellow); }
  .entry-bubble.standby { background: rgba(139,148,168,0.1); border-left-color: var(--muted); }
  .entry-bubble.training { background: rgba(163,113,247,0.1); border-left-color: var(--accent-2); }
  .entry-bubble.admin { background: rgba(63,185,80,0.1); border-left-color: var(--green); }
  .entry-bubble strong { display: block; font-size: 11px; }
  .entry-bubble .small { color: var(--muted); font-size: 10px; }
  /* Review states (Step 26b) */
  .entry-bubble.flagged { outline: 1.5px solid var(--yellow); position: relative; }
  .entry-bubble.flagged::after { content: '⚑'; position: absolute; top: 2px; right: 4px; color: var(--yellow); font-size: 11px; line-height: 1; }
  .entry-bubble.rejected { outline: 1.5px solid var(--red); opacity: 0.6; position: relative; }
  .entry-bubble.rejected strong, .entry-bubble.rejected .small { text-decoration: line-through; }
  .entry-bubble.rejected::after { content: '✕'; position: absolute; top: 2px; right: 4px; color: var(--red); font-size: 11px; line-height: 1; }
  .entry-bubble[data-clickable="1"] { cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
  .entry-bubble[data-clickable="1"]:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
  .review-reason-hint { display: block; font-size: 10px; color: var(--muted); font-style: italic; margin-top: 2px; line-height: 1.3; }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 24px; min-width: 480px; max-width: 90vw; max-height: 90vh; overflow: auto;
  }
  .modal h3 { margin-top: 0; }
  .modal-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .modal-row label { width: 100px; color: var(--muted); font-size: 12px; }
  .modal-row select, .modal-row input { flex: 1; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .team-mgmt-table { width: 100%; }
  .team-mgmt-table td { padding: 6px 8px; }
  .team-mgmt-table input[type=checkbox], .team-mgmt-table input[type=radio] {
    width: 16px; height: 16px; cursor: pointer;
  }
  .lead-marker { color: var(--yellow); font-weight: 600; }
  #signin-page {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  #signin-page .panel { width: 380px; }
  .divider {
    display: flex; align-items: center; gap: 12px; margin: 16px 0;
    color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--panel); border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    padding: 12px 16px; border-radius: 6px; max-width: 320px;
    z-index: 200; animation: slideIn 0.2s ease-out;
  }
  .toast.error { border-left-color: var(--red); }
  .toast.success { border-left-color: var(--green); }
  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
</style>
</head>
<body>

<div id="boot-loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0e14;color:#9aa4b2;font:14px/1.4 -apple-system,Segoe UI,sans-serif;z-index:9999">Loading AZNET Scheduler…</div>
<div id="signin-page" style="display:none">
  <div class="panel">
    <h2>AZNET Scheduler</h2>
    <p style="color: var(--muted); font-size: 13px;">Sign in with your Microsoft 365 (@aznet.sg) account.</p>
    <button id="ms-signin-btn" class="ms-signin">
      <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </button>
    <div class="divider">or</div>
    <p style="color: var(--muted); font-size: 12px; margin-top: 0;">Magic link fallback:</p>
    <input type="email" id="signin-email" placeholder="you@aznet.sg" style="width: 100%; margin-bottom: 8px;">
    <button id="signin-btn" class="secondary" style="width: 100%;">Send magic link</button>
    <p id="signin-msg" style="color: var(--muted); font-size: 12px; margin-top: 12px;"></p>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <h1>AZNET Scheduler</h1>
    <nav>
      <button data-view="my-schedule" class="active">My Schedule</button>
      <button data-view="team-week">Team Week</button>
      <button id="nav-manage-btn" data-view="manage">Manage</button>
      <button id="signout-btn" class="secondary">Sign out</button>
    </nav>
  </header>
  <main>
    <div id="view-my-schedule"></div>
    <div id="view-team-week" style="display:none"></div>
    <div id="view-manage" style="display:none"></div>
  </main>
</div>

<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
const SUPABASE_URL = 'https://tixgkvsyifuqanupmcic.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpeGdrdnN5aWZ1cWFudXBtY2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjQyMDEsImV4cCI6MjA5MjYwMDIwMX0.lnXmf4bV6orj64EVpuGS5AgmvpVhM4Amgcvhj39fbtU';
const MS_TENANT_ID = 'aznet.sg';
const MS_CLIENT_ID = '390064d5-c524-4166-ae2f-faeef82da5e5';
const MS_REDIRECT_URI = `${SUPABASE_URL}/functions/v1/ms-oauth-callback`;

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    flowType: 'implicit',
    storage: window.localStorage,
    storageKey: 'sb-aznet-scheduler-auth',
    lock: async (name, acquireTimeout, fn) => fn()
  }
});

let currentUser = null;
let currentEngineer = null;
let isManager = false;
let canSeePricing = false;

function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('en-SG', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: true });
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-SG', { day: '2-digit', month: 'short' });
}
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit', hour12: true });
}
function hoursBetween(start, end) {
  return ((new Date(end) - new Date(start)) / (1000 * 60 * 60)).toFixed(2);
}
function toast(msg, kind = 'info') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${kind}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Concurrency guard: onAuthStateChange + the manual checkSession() at end of
// script can fire this in parallel during page boot. Only one runs at a time.
let _checkSessionRunning = false;
let _checkSessionPending = false;

function hideBootLoading() {
  const b = document.getElementById('boot-loading');
  if (b) b.style.display = 'none';
}
function showSigninFallback(reason) {
  hideBootLoading();
  const signinEl = document.getElementById('signin-page');
  const appEl = document.getElementById('app');
  if (signinEl) signinEl.style.display = 'flex';
  if (appEl) appEl.style.display = 'none';
  if (reason) console.warn('Falling back to signin:', reason);
}

async function checkSession() {
  if (_checkSessionRunning) { _checkSessionPending = true; return; }
  _checkSessionRunning = true;

  // Watchdog: if anything below hangs > 8s (e.g. Supabase auth stuck on stale
  // state after refresh), force the signin page so the screen is never blank.
  let watchdogFired = false;
  const watchdog = setTimeout(() => {
    watchdogFired = true;
    showSigninFallback('checkSession watchdog timeout (8s)');
    toast('Sign-in took too long. Please try again.', 'error');
  }, 8000);

  const signinEl = document.getElementById('signin-page');
  const appEl = document.getElementById('app');
  try {
    console.log('[checkSession] start');
    const { data: { session }, error: sessionErr } = await sb.auth.getSession();
    if (watchdogFired) return;
    console.log('[checkSession] getSession ok, session?', !!session);
    if (sessionErr) throw sessionErr;
    if (!session) {
      hideBootLoading();
      signinEl.style.display = 'flex';
      appEl.style.display = 'none';
      return;
    }
    if (!session.user.email || !session.user.email.toLowerCase().endsWith('@aznet.sg')) {
      toast('Only @aznet.sg accounts can use this app.', 'error');
      hideBootLoading();
      signinEl.style.display = 'flex';
      appEl.style.display = 'none';
      try { await sb.auth.signOut(); } catch (_) {}
      return;
    }
    currentUser = session.user;
    await loadCurrentEngineer();
    if (watchdogFired) return;
    console.log('[checkSession] loadCurrentEngineer ok, engineer?', !!currentEngineer);
    if (!currentEngineer) {
      hideBootLoading();
      signinEl.style.display = 'flex';
      appEl.style.display = 'none';
      return;
    }
    // Hide Manage tab for non-managers (defense in depth — RPCs also check)
    const manageBtn = document.getElementById('nav-manage-btn');
    if (manageBtn) manageBtn.style.display = isManager ? '' : 'none';
    // Show app FIRST, then render — so a render error doesn't leave a blank page
    hideBootLoading();
    signinEl.style.display = 'none';
    appEl.style.display = 'block';
    try {
      await renderMySchedule();
    } catch (renderErr) {
      console.error('renderMySchedule failed:', renderErr);
      toast('UI error: ' + (renderErr.message || renderErr), 'error');
    }
  } catch (err) {
    console.error('Session init failed:', err);
    if (!watchdogFired) {
      toast('Sign-in error: ' + (err.message || err), 'error');
      hideBootLoading();
      signinEl.style.display = 'flex';
      appEl.style.display = 'none';
    }
  } finally {
    clearTimeout(watchdog);
    _checkSessionRunning = false;
    if (_checkSessionPending) {
      _checkSessionPending = false;
      checkSession();
    }
  }
}

async function loadCurrentEngineer() {
  const { data, error } = await sb.from('engineers').select('*').eq('email', currentUser.email).maybeSingle();
  if (error || !data) {
    toast('Your @aznet.sg account is not yet registered as an engineer. Ask a manager.', 'error');
    return;
  }
  currentEngineer = data;
  isManager = data.is_manager;
  canSeePricing = data.can_see_pricing;
}

document.getElementById('ms-signin-btn').addEventListener('click', async () => {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'azure',
    options: {
      scopes: 'openid profile email',
      redirectTo: window.location.origin + window.location.pathname
    }
  });
  if (error) toast('Microsoft sign-in failed: ' + error.message, 'error');
});

document.getElementById('signin-btn').addEventListener('click', async () => {
  const email = document.getElementById('signin-email').value.trim();
  if (!email.endsWith('@aznet.sg')) {
    toast('Only @aznet.sg emails are allowed', 'error'); return;
  }
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + window.location.pathname }
  });
  if (error) { toast(error.message, 'error'); return; }
  document.getElementById('signin-msg').textContent = 'Magic link sent. Check your email.';
});

document.getElementById('signout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});

document.querySelectorAll('nav button[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button[data-view]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.view;
    document.getElementById('view-my-schedule').style.display = v === 'my-schedule' ? 'block' : 'none';
    document.getElementById('view-team-week').style.display = v === 'team-week' ? 'block' : 'none';
    document.getElementById('view-manage').style.display = v === 'manage' ? 'block' : 'none';
    if (v === 'team-week') renderTeamWeek();
    if (v === 'manage') renderManage();
    if (v === 'my-schedule') renderMySchedule();
  });
});

async function renderMySchedule() {
  if (!currentEngineer) return;
  const root = document.getElementById('view-my-schedule');

  const { data: connStatus } = await sb.rpc('rpc_my_calendar_status');
  const conn = (connStatus && connStatus[0]) || null;

  const { data: entries, error: entriesErr } = await sb.from('work_entries')
    .select('*, projects(project_code, name), customers:customer_id(name)')
    .eq('engineer_id', currentEngineer.id)
    .order('start_at', { ascending: false }).limit(50);
  if (entriesErr) { console.error('Entries query failed:', entriesErr); toast('Failed to load entries: ' + entriesErr.message, 'error'); }

  root.innerHTML = `
    <div class="panel">
      <h2>Calendar Sync</h2>
      <div class="calendar-status-card">
        <div style="flex:1">
          ${conn && conn.connected ? `
            <strong>Connected</strong> · <span class="badge">${escapeHtml(conn.ms_email || '')}</span><br>
            <span style="color: var(--muted); font-size: 12px;">
              Last sync: ${conn.last_sync_at ? fmtDateTime(conn.last_sync_at) : 'never'}
              ${conn.last_sync_status === 'ok' ? `<span class="pill pill-green">${conn.last_sync_event_count || 0} events</span>` : ''}
              ${conn.last_sync_status === 'error' ? `<span class="pill pill-red">error: ${escapeHtml(conn.last_sync_error || '')}</span>` : ''}
            </span>
          ` : `
            <strong>Not connected</strong><br>
            <span style="color: var(--muted); font-size: 12px;">Connect Outlook to auto-import your calendar events.</span>
          `}
        </div>
        <div>
          ${conn && conn.connected ? `
            <button id="sync-now-btn">Sync now</button>
            <button id="reconnect-btn" class="secondary">Reconnect</button>
          ` : `
            <button id="connect-btn">Connect Outlook</button>
          `}
        </div>
      </div>

      <h3>Manual entry</h3>
      <div class="row-form">
        <input type="datetime-local" id="manual-start" />
        <input type="datetime-local" id="manual-end" />
        <select id="manual-type">
          <option value="project">Project</option>
          <option value="leave">Leave</option>
          <option value="admin">Admin</option>
          <option value="training">Training</option>
          <option value="standby">Standby</option>
        </select>
        <select id="manual-project"><option value="">Select project…</option></select>
        <label><input type="checkbox" id="manual-cutover"> cutover</label>
        <input type="text" id="manual-title" placeholder="Title (optional)" style="flex:1; min-width: 200px;">
        <button id="manual-save">Save entry</button>
      </div>
    </div>

    <div class="panel">
      <div style="display:flex; justify-content: space-between; align-items: center;">
        <h2>My entries</h2>
        <div>
          <label style="color: var(--muted); font-size: 12px;">Show:</label>
          <select id="entries-filter">
            <option value="all">All</option>
            <option value="unmatched">Unmatched only</option>
            <option value="unconfirmed">Unconfirmed only</option>
          </select>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>When</th><th>Event</th><th>Customer (SI)</th><th>Project</th><th>Hours</th><th>Source</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody id="my-entries-body"></tbody>
      </table>
    </div>
  `;

  if (conn && conn.connected) {
    document.getElementById('sync-now-btn').addEventListener('click', async () => {
      toast('Syncing…', 'info');
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/sync-calendars?engineer_id=${currentEngineer.id}`, {
          headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'apikey': SUPABASE_ANON_KEY }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        await renderMySchedule();
        toast('Synced.', 'success');
      } catch (e) { toast('Sync failed: ' + e.message, 'error'); }
    });
    document.getElementById('reconnect-btn').addEventListener('click', startMsCalendarOAuth);
  } else {
    document.getElementById('connect-btn').addEventListener('click', startMsCalendarOAuth);
  }

  await populateProjectDropdown('manual-project');

  document.getElementById('manual-save').addEventListener('click', async () => {
    const start = document.getElementById('manual-start').value;
    const end = document.getElementById('manual-end').value;
    const type = document.getElementById('manual-type').value;
    const project = document.getElementById('manual-project').value;
    const cutover = document.getElementById('manual-cutover').checked;
    const title = document.getElementById('manual-title').value;
    if (!start || !end) { toast('Pick start + end', 'error'); return; }
    const { error } = await sb.rpc('rpc_log_work_entry', {
      p_start_at: new Date(start).toISOString(),
      p_end_at: new Date(end).toISOString(),
      p_entry_type: type,
      p_project_id: project || null,
      p_is_cutover: cutover,
      p_raw_title: title || null
    });
    if (error) { toast(error.message, 'error'); return; }
    toast('Saved.', 'success');
    await renderMySchedule();
  });

  document.getElementById('entries-filter').addEventListener('change', () => renderEntriesTable(entries));
  renderEntriesTable(entries);
}

function renderEntriesTable(entries) {
  const filter = document.getElementById('entries-filter').value;
  const tbody = document.getElementById('my-entries-body');
  let rows = entries || [];
  if (filter === 'unmatched') rows = rows.filter(e => e.match_status === 'unmatched');
  if (filter === 'unconfirmed') rows = rows.filter(e => !e.confirmed);
  tbody.innerHTML = rows.map(e => {
    const proj = e.projects;
    const cust = e.customers;
    return `<tr>
      <td>${escapeHtml(fmtDateTime(e.start_at))}</td>
      <td>${escapeHtml(e.raw_title || '—')} ${e.is_cutover ? '<span class="pill pill-purple">cutover</span>' : ''}</td>
      <td>${cust ? escapeHtml(cust.name) : '—'}</td>
      <td>${proj ? `<span class="badge">${escapeHtml(proj.project_code)}</span>` : '—'}</td>
      <td>${hoursBetween(e.start_at, e.end_at)}</td>
      <td><span class="pill pill-gray">${escapeHtml(e.source)}</span></td>
      <td>${e.match_status === 'matched'
        ? '<span class="pill pill-green">matched</span>'
        : '<span class="pill pill-red">unmatched</span>'}
        ${e.confirmed ? ' <span class="pill pill-blue">confirmed</span>' : ''}</td>
      <td><button class="small secondary edit-entry-btn" data-id="${e.id}">Edit</button></td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('.edit-entry-btn').forEach(btn => {
    btn.addEventListener('click', () => openEntryEditModal(btn.dataset.id, entries));
  });
}

async function populateProjectDropdown(selectId, selectedId = null) {
  const { data } = await sb.from('projects').select('id, project_code, name, customers:customer_id(name)').eq('status', 'active').order('project_code');
  const sel = document.getElementById(selectId);
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">Select project…</option>' + (data || []).map(p =>
    `<option value="${p.id}" ${p.id === selectedId ? 'selected' : ''}>${escapeHtml(p.project_code)} — ${escapeHtml(p.name || '')} (${escapeHtml(p.customers?.name || 'no SI')})</option>`
  ).join('');
  if (selectedId) sel.value = selectedId;
  else if (cur) sel.value = cur;
}

function startMsCalendarOAuth() {
  const params = new URLSearchParams({
    client_id: MS_CLIENT_ID,
    response_type: 'code',

    response_mode: 'query',

  });

async function renderTeamWeek() {
  const root = document.getElementById('view-team-week');
  const today = new Date();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((today.getDay() + 6) % 7));
  monday.setHours(0,0,0,0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 7);

  const { data: engineers } = await sb.from('engineers').select('*').eq('active', true).order('name');
  const { data: entries } = await sb.from('work_entries')
    .select('*, projects(project_code), customers:customer_id(name)')
    .gte('start_at', monday.toISOString()).lt('start_at', sunday.toISOString());

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    days.push(d);
  }
  const cells = {};
  (entries || []).forEach(e => {
    const dayIdx = Math.floor((new Date(e.start_at) - monday) / (1000*60*60*24));
    const key = `${e.engineer_id}|${dayIdx}`;
    (cells[key] = cells[key] || []).push(e);
  });

  root.innerHTML = `
    <div class="panel">
      <h2>Team Week — ${fmtDate(monday.toISOString())} to ${fmtDate(new Date(sunday-1).toISOString())}</h2>
      <p style="color: var(--muted); font-size: 11px; margin-top: -8px;">
        ↔ Swipe horizontally to see all 7 days${isManager ? ' · Tap any entry to flag/reject' : ''}
      </p>
      <div class="week-grid-wrap">
        <div class="week-grid">
          <div class="cell header-cell name-cell">Engineer</div>
          ${days.map(d => `<div class="cell header-cell">${d.toLocaleDateString('en-SG', { weekday: 'short' })}<br>${fmtDate(d.toISOString())}</div>`).join('')}
          ${(engineers || []).map(eng => `
            <div class="cell name-cell">${escapeHtml(eng.name)}</div>
            ${days.map((d, i) => {
              const items = cells[`${eng.id}|${i}`] || [];
              return `<div class="cell">${items.map(it => {
                const typeCls = it.match_status === 'unmatched' ? 'unmatched' : (it.entry_type !== 'project' ? it.entry_type : '');
                const reviewCls = (it.review_status === 'flagged' || it.review_status === 'rejected') ? it.review_status : '';
                const cls = [typeCls, reviewCls].filter(Boolean).join(' ');
                const customerLabel = it.customers?.name ? escapeHtml(it.customers.name) : (it.entry_type !== 'project' ? it.entry_type : 'unmatched');
                const projLabel = it.projects?.project_code ? `<span class="badge">${escapeHtml(it.projects.project_code)}</span>` : '';
                const reasonHint = (it.review_status === 'flagged' || it.review_status === 'rejected') && it.review_reason
                  ? `<span class="review-reason-hint">${it.review_status === 'flagged' ? '⚑' : '✕'} ${escapeHtml(it.review_reason)}</span>`
                  : '';
                const clickable = isManager ? 'data-clickable="1"' : '';
                return `<div class="entry-bubble ${cls}" data-entry-id="${it.id}" ${clickable}>
                  <strong>${customerLabel}</strong>
                  <span class="small">${fmtTime(it.start_at)} · ${hoursBetween(it.start_at, it.end_at)}h</span>
                  ${projLabel}
                  ${reasonHint}
                </div>`;
              }).join('')}</div>`;
            }).join('')}
          `).join('')}
        </div>
      </div>
    </div>
  `;

  // Wire click-to-review for managers (Step 26b)
  if (isManager) {
    const engineersById = {};
    (engineers || []).forEach(e => { engineersById[e.id] = e; });
    root.querySelectorAll('.entry-bubble[data-clickable="1"]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.entryId;
        const entry = (entries || []).find(e => e.id === id);
        if (entry) openReviewModal(entry, engineersById);
      });
    });
  }
}

// ──────────────────────────────────────────────────────────────────
// Review modal (Step 26b) — manager-only flag/reject/reset on a work entry
// ──────────────────────────────────────────────────────────────────
function openReviewModal(entry, engineersById) {
  if (!isManager) return;
  const c = document.getElementById('modal-container');
  const engName = engineersById?.[entry.engineer_id]?.name || '—';
  const reviewerName = entry.reviewed_by ? (engineersById?.[entry.reviewed_by]?.name || 'Unknown') : null;
  const status = entry.review_status || 'approved';
  const statusBadge = status === 'approved'
    ? '<span style="color: var(--green);">● Approved</span>'
    : status === 'flagged'
      ? '<span style="color: var(--yellow);">⚑ Flagged</span>'
      : '<span style="color: var(--red);">✕ Rejected</span>';
  const projectLabel = entry.projects?.project_code
    ? `${escapeHtml(entry.projects.project_code)}${entry.projects.name ? ' — ' + escapeHtml(entry.projects.name || '') : ''}`
    : '—';
  const customerLabel = entry.customers?.name ? escapeHtml(entry.customers.name) : '—';

  c.innerHTML = `
    <div class="modal-backdrop">
      <div class="modal" style="min-width: 460px;">
        <h3>Review entry</h3>
        <div style="color: var(--muted); font-size: 12px; margin-bottom: 12px; line-height: 1.6;">
          <strong style="color: var(--text);">${escapeHtml(engName)}</strong><br>
          ${escapeHtml(fmtDateTime(entry.start_at))} → ${escapeHtml(fmtDateTime(entry.end_at))} · ${hoursBetween(entry.start_at, entry.end_at)}h<br>
          Project: ${projectLabel}<br>
          Customer: ${customerLabel}<br>
          ${entry.raw_title ? 'Title: ' + escapeHtml(entry.raw_title) + '<br>' : ''}
          Status: ${statusBadge}
          ${reviewerName ? `<br><span style="font-size: 11px;">Last reviewed by ${escapeHtml(reviewerName)} · ${fmtDateTime(entry.reviewed_at)}</span>` : ''}
          ${entry.review_reason ? `<br><span style="font-size: 11px; font-style: italic;">"${escapeHtml(entry.review_reason)}"</span>` : ''}
        </div>
        <div class="modal-row">
          <label>Action</label>
          <select id="review-action">
            <option value="flag" ${status==='flagged'?'selected':''}>Flag (engineer should fix)</option>
            <option value="reject" ${status==='rejected'?'selected':''}>Reject (exclude from utilisation)</option>
            <option value="reset" ${status==='approved'?'selected':''}>Reset to approved</option>
          </select>
        </div>
        <div class="modal-row" id="review-reason-row">
          <label>Reason</label>
          <textarea id="review-reason" rows="3" placeholder="Required for flag/reject (e.g. wrong project, double-booked)"></textarea>
        </div>
        <div class="modal-actions">
          <button id="review-cancel" class="secondary">Cancel</button>
          <button id="review-submit">Submit</button>
        </div>
      </div>
    </div>
  `;

  function syncReasonVisibility() {
    const action = document.getElementById('review-action').value;
    const row = document.getElementById('review-reason-row');
    row.style.display = (action === 'reset') ? 'none' : '';
  }
  document.getElementById('review-action').addEventListener('change', syncReasonVisibility);
  syncReasonVisibility();

  document.getElementById('review-cancel').addEventListener('click', () => { c.innerHTML = ''; });
  document.getElementById('review-submit').addEventListener('click', async () => {
    const action = document.getElementById('review-action').value;
    const reason = document.getElementById('review-reason').value.trim();
    if ((action === 'flag' || action === 'reject') && !reason) {
      toast('Reason is required when flagging or rejecting.', 'error');
      return;
    }
    const btn = document.getElementById('review-submit');
    btn.disabled = true; btn.textContent = 'Saving…';
    const { error } = await sb.rpc('rpc_review_work_entry', {
      p_entry_id: entry.id,
      p_action: action,
      p_reason: action === 'reset' ? null : reason
    });
    if (error) {
      toast('Review failed: ' + error.message, 'error');
      btn.disabled = false; btn.textContent = 'Submit';
      return;
    }
    const successMsg = action === 'reset' ? 'Entry reset to approved.'
      : action === 'flag' ? 'Entry flagged.'
      : 'Entry rejected.';
    toast(successMsg, 'success');
    c.innerHTML = '';
    await renderTeamWeek();
  });
}

    });
    if (error) { toast(error.message, 'error'); return; }
    toast('Customer added.', 'success');
    await renderManage();
  });

  document.querySelectorAll('.edit-domains-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const newDomains = prompt('Enter comma-separated domains:', btn.dataset.domains);
      if (newDomains === null) return;
      const { error } = await sb.rpc('rpc_update_customer', {
        p_customer_id: btn.dataset.id,
        p_email_domains: newDomains.split(',').map(s => s.trim()).filter(Boolean)
      });
      if (error) { toast(error.message, 'error'); return; }
      toast('Updated.', 'success');
      await renderManage();
    });
  });

  document.getElementById('proj-add').addEventListener('click', async () => {
    const { error } = await sb.rpc('rpc_create_project', {
      p_project_code: document.getElementById('proj-code').value,
      p_customer_id: document.getElementById('proj-customer').value || null,
      p_end_user_id: document.getElementById('proj-enduser').value || null,
      p_name: document.getElementById('proj-name').value
    });
    if (error) { toast(error.message, 'error'); return; }
    toast('Project created.', 'success');
    await renderManage();
  });

  document.querySelectorAll('.set-status-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const { error } = await sb.rpc('rpc_set_project_status', {
        p_project_id: btn.dataset.id,
        p_status: btn.dataset.status
      });
      if (error) { toast(error.message, 'error'); return; }
      toast('Status updated.', 'success');
      await renderManage();
    });
  });

  document.querySelectorAll('.manage-team-btn').forEach(btn => {
    btn.addEventListener('click', () => openManageTeamModal(btn.dataset.id));
  });
}

async function openManageTeamModal(projectId) {
  if (!isManager) { toast('Only managers can change project teams.', 'error'); return; }
  const { data: project } = await sb.from('projects')
    .select('id, project_code, name, full_tag').eq('id', projectId).maybeSingle();
  const { data: engineers } = await sb.from('engineers').select('id, name, email, active').eq('active', true).order('name');
  const { data: assignments } = await sb.from('project_engineers')
    .select('engineer_id, is_lead').eq('project_id', projectId);

  const assignedSet = new Set((assignments || []).map(a => a.engineer_id));
  const leadId = (assignments || []).find(a => a.is_lead)?.engineer_id || null;

  const c = document.getElementById('modal-container');
  c.innerHTML = `
    <div class="modal-backdrop">
      <div class="modal" style="min-width: 540px;">
        <h3>Manage team — ${escapeHtml(project?.full_tag || project?.project_code || '')}</h3>
        <div style="color: var(--muted); font-size: 12px; margin-bottom: 16px;">
          ${escapeHtml(project?.name || '')}<br>
          Tick to assign. Use the ★ column to mark exactly one engineer as the project lead.
        </div>
        <table class="team-mgmt-table">
          <thead>
            <tr><th style="width: 40px;">On</th><th style="width: 40px;" title="Lead">★</th><th>Engineer</th><th>Email</th></tr>
          </thead>
          <tbody>
            ${(engineers || []).map(e => `
              <tr>
                <td><input type="checkbox" class="assign-cb" data-eng="${e.id}" ${assignedSet.has(e.id) ? 'checked' : ''}></td>
                <td><input type="radio" name="lead-radio" class="lead-rb" data-eng="${e.id}" ${leadId === e.id ? 'checked' : ''}></td>
                <td>${escapeHtml(e.name)}</td>
                <td><span style="color: var(--muted); font-size: 12px;">${escapeHtml(e.email)}</span></td>
              </tr>
            `).join('')}
            <tr>
              <td colspan="2"><input type="radio" name="lead-radio" class="lead-rb" data-eng="" ${leadId === null ? 'checked' : ''}></td>
              <td colspan="2" style="color: var(--muted); font-size: 12px;">— no lead —</td>
            </tr>
          </tbody>
        </table>
        <div class="modal-actions">
          <button id="team-cancel" class="secondary">Cancel</button>
          <button id="team-save">Save</button>
        </div>
      </div>
    </div>
  `;

  c.querySelectorAll('.lead-rb').forEach(rb => {
    rb.addEventListener('change', () => {
      const engId = rb.dataset.eng;
      if (!engId) return;
      const cb = c.querySelector(`.assign-cb[data-eng="${engId}"]`);
      if (cb && !cb.checked) cb.checked = true;
    });
  });
  c.querySelectorAll('.assign-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      if (!cb.checked) {
        const rb = c.querySelector(`.lead-rb[data-eng="${cb.dataset.eng}"]`);
        if (rb && rb.checked) {
          rb.checked = false;
          c.querySelector('.lead-rb[data-eng=""]').checked = true;
        }
      }
    });
  });

  document.getElementById('team-cancel').addEventListener('click', () => c.innerHTML = '');
  document.getElementById('team-save').addEventListener('click', async () => {
    const targetAssigned = new Set();
    c.querySelectorAll('.assign-cb:checked').forEach(cb => targetAssigned.add(cb.dataset.eng));
    const targetLead = c.querySelector('.lead-rb:checked')?.dataset.eng || '';

    const errors = [];
    for (const a of (assignments || [])) {
      if (!targetAssigned.has(a.engineer_id)) {
        const { error } = await sb.rpc('rpc_unassign_engineer', { p_project_id: projectId, p_engineer_id: a.engineer_id });
        if (error) errors.push(error.message);
      }
    }
    for (const engId of targetAssigned) {
      if (!assignedSet.has(engId)) {
        const { error } = await sb.rpc('rpc_assign_engineer', { p_project_id: projectId, p_engineer_id: engId, p_is_lead: false });
        if (error) errors.push(error.message);
      }
    }
    if (targetLead) {
      const { error } = await sb.rpc('rpc_set_lead_engineer', { p_project_id: projectId, p_engineer_id: targetLead });
      if (error) errors.push(error.message);
    } else if (leadId) {
      const { error } = await sb.rpc('rpc_assign_engineer', { p_project_id: projectId, p_engineer_id: leadId, p_is_lead: false });
      if (error) errors.push(error.message);
    }

    if (errors.length) { toast(errors.join('; '), 'error'); return; }
    toast('Team updated.', 'success');
    c.innerHTML = '';
    await renderManage();
  });
}

// Filter: only re-run checkSession on meaningful auth events. TOKEN_REFRESHED
// fires periodically and doesn't need a re-render; INITIAL_SESSION fires on
// listener attach which would race with the manual checkSession() below.
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') {
    console.log('[auth] event:', event);
    checkSession();
  }
});
checkSession();
</script>
